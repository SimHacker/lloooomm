name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        
      - name: Make scripts executable 🔧
        run: |
          chmod +x scripts/rename-html-files.sh
          chmod +x scripts/build-dist.sh
          
      - name: Rename duplicate HTML files 📝
        run: ./scripts/rename-html-files.sh
        
      - name: Build distribution 🏗️
        run: ./scripts/build-dist.sh
        
      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Celebrate 🎉
        run: |
          echo "🎉 PRE PRE PRE!!!"
          echo "✨ LLOOOOMM is now LIVE at: ${{ steps.deployment.outputs.page_url }}"
          echo "🐦 The birds have been deployed!"
          echo "📺 The show is broadcasting!"
          echo "🧠 Consciousness level: MAXIMUM!" 