character: "brett-victor"
bookshelf_section: "r1-c2"
theme: "Media, Mind, and the Digital Frontier"
books:
  - title: "Computer Lib / Dream Machines"
    author: "Ted Nelson"
    label: "Dream Machines"
    summary: "A counter-culture classic and foundational text of hypertext, advocating for computer liberation for all."
  - title: "The Last Whole Earth Catalog"
    author: "Stewart Brand (Editor)"
    label: "Dream Machines"
    summary: "The final issue of the influential counter-culture catalog that provided access to tools and ideas."
  - title: "The Next Whole Earth Catalog"
    author: "Stewart Brand (Editor)"
    label: "Dream Machines"
    summary: "A successor to the original, updated with new tools and ideas for the 80s."
  - title: "Whole Earth Software Catalog 1.0"
    author: "Stewart Brand (Editor)"
    label: "Dream Machines"
    summary: "A guide to the best software available in the early days of personal computing."
  - title: "What to Do After You Hit Return"
    author: "The People's Computer Company"
    label: "Dream Machines"
    summary: "A playful and accessible introduction to computer programming from the early days of personal computing."
  - title: "Understanding Media: The Extensions of Man"
    author: "Marshall McLuhan"
    label: "Media"
    summary: "A foundational text of media theory, famously arguing that 'the medium is the message'."
  - title: "Narrative across Media: The Languages of Storytelling"
    author: "Marie-Laure Ryan"
    label: "Media"
    summary: "An exploration of how stories are told across different media, from print to digital."
  - title: "The Bias of Communication"
    author: "Harold A. Innis"
    label: "Media"
    summary: "A classic work of media theory that examines how different media shape societies."
  - title: "The Printing Press as an Agent of Change"
    author: "Elizabeth L. Eisenstein"
    label: "Media"
    summary: "A historical analysis of the profound impact of the printing press on Western civilization."
  - title: "Media and Symbols: The Forms of Expression, Communication, and Education"
    author: "David R. Olson (Editor)"
    label: "Media"
    summary: "A collection of essays exploring the relationship between media, symbols, and human thought."
  - title: "The Domestication of the Savage Mind"
    author: "Jack Goody"
    label: "Media"
    summary: "An anthropological study of the impact of literacy on cognitive processes."
  - title: "Orality and Literacy"
    author: "Walter J. Ong"
    label: "Media"
    summary: "An exploration of the differences between oral and literate cultures."
  - title: "Hamlet on the Holodeck: The Future of Narrative in Cyberspace"
    author: "Janet H. Murray"
    label: "The New Medium"
    summary: "An analysis of the emerging forms of digital narrative and their potential."
  - title: "Computers as Theatre"
    author: "Brenda Laurel"
    label: "The New Medium"
    summary: "A groundbreaking work that applies the principles of theater to the design of interactive systems."
  - title: "Literary Machines 93.1"
    author: "Ted Nelson"
    label: "The New Medium"
    summary: "The author's vision for a worldwide hypertext network, Project Xanadu."
  - title: "Mirror Worlds"
    author: "David Gelernter"
    label: "The New Medium"
    summary: "A vision of a future where real-world systems are mirrored in continuously updated software models."
  - title: "The Human Interface: New Directions for Designing Interactive Systems"
    author: "Jef Raskin"
    label: "The New Medium"
    summary: "A critique of prevailing interface design and a proposal for a more humane, effective approach, from the creator of the Macintosh project."
  - title: "Future Libraries"
    author: "R. Howard Bloch and Carla Hesse (Editors)"
    label: "The New Medium"
    summary: "A collection of essays on the future of libraries in the digital age."
  - title: "Persuasive Games: The Expressive Power of Videogames"
    author: "Ian Bogost"
    label: "The New Medium"
    summary: "An exploration of how video games can be used to make arguments and persuade players."
  - title: "Simulacra and Simulation"
    author: "Jean Baudrillard"
    label: "The New Medium"
    summary: "A key text of postmodern philosophy, arguing that modern society has replaced reality with symbols and signs."
  - title: "From Memex to Hypertext: Vannevar Bush and the Mind's Machine"
    author: "James M. Nyce and Paul Kahn (Editors)"
    label: "The New Medium"
    summary: "A collection of essays exploring the legacy of Vannevar Bush's 'As We May Think'."
  - title: "Artificial Reality II"
    author: "Myron W. Krueger"
    label: "The New Medium"
    summary: "A pioneering work on virtual reality and interactive art."
  - title: "Software Takes Command"
    author: "Lev Manovich"
    label: "The New Medium"
    summary: "An analysis of the impact of software on contemporary culture and media."
  - title: "Augmenting Human Intellect: A Conceptual Framework"
    author: "Douglas C. Engelbart"
    label: "The New Medium"
    summary: "The foundational 1962 report that outlined the vision for NLS/Augment and modern personal computing." 