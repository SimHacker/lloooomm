- title: 'The Humane Interface: New Directions for Designing Interactive Systems'
  id: BretVictor_r2_c1_InterfaceDesign_TheHumaneInterfaceNewDirectionsForDesigningInteractiveSystems
  author: Jef Raskin
  publication_year: 2000
  publisher: Addison-Wesley
  isbn: '9780201379372'
  pages: 233
  amazon_link: https://www.amazon.com/Humane-Interface-Directions-Designing-Interactive/dp/0201379376
  goodreads_link: https://www.goodreads.com/book/show/344726.The_Humane_Interface
  summary: A radical rethinking of interface design by the creator of the Macintosh
    project. Raskin argues that current interfaces are fundamentally flawed and proposes
    scientifically-grounded alternatives based on human cognition. He introduces concepts
    like modelessness, monotony, and the elimination of applications in favor of commands.
    His vision includes zooming interfaces and text-based interaction that respects
    human limitations.
  label: Interface Design
  key_concepts:
  - Modelessness
  - Monotony (one way to do things)
  - LEAP keys for navigation
  - Zooming interface paradigm (ZIP)
  - Commands instead of applications
  jazz:
    cosmic_significance: Raskin doesn't just critique bad interfaces—he reimagines
      computing from first principles. His book is a manifesto for interfaces that
      respect human cognition rather than forcing humans to adapt to machines.
    relevance_to_victor: Raskin's scientific approach to interface design, grounded
      in cognitive psychology, deeply influenced Victor. Both share the belief that
      interfaces should be 'humane'—responsive to human needs and considerate of human
      frailties. Raskin's emphasis on immediate feedback and modelessness appears
      throughout Victor's work.
    paradigm_shift_potential: By proposing to eliminate files, applications, and even
      the desktop metaphor, Raskin challenges every assumption of modern computing.
      His zooming interface concept predates and influences modern touch interfaces.
    jamming_language:
      name: HumaneScript
      description: A grammar for cognition-centered design
      syntax:
      - locus_of_attention: one_thing_at_a_time
      - modes: eliminated
        because: humans_forget_state
      - monotony: one_way_to_do_each_task
        enables: habit_formation
      - feedback: immediate_and_continuous
    tags:
    - interface-design
    - cognitive-psychology
    - jef-raskin
    - macintosh
    - humane-computing
    related_works:
    - The Design of Everyday Things (Norman)
    - About Face (Cooper)
