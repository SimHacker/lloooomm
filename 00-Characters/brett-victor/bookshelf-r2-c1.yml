  summary: A monumental oral history of interaction design told through interviews
    with 40 pioneers who shaped how we interact with technology. Moggridge, designer
    of the first laptop (GRiD Compass) and co-founder of IDEO, traces the evolution
    from the invention of the mouse through the development of the desktop metaphor
    to modern digital experiences. Includes a DVD with video interviews.
  label: Interface Design
  key_concepts:
  - Evolution of human-computer interaction
  - Design process at IDEO
  - People and prototypes
  - From desktop to palm to internet
  jazz:
    cosmic_significance: This is the Studs Terkel of interaction design—a chorus of
      voices telling the story of how we learned to dance with machines. It's both
      historical document and design manifesto.
    relevance_to_victor: Moggridge's book is essential context for understanding Victor's
      work. Many of the pioneers interviewed (Doug Engelbart, Alan Kay, Larry Tesler)
      directly influenced Victor's thinking. The book shows how each generation builds
      on the last's breakthroughs.
    paradigm_shift_potential: By documenting the messy, human process of innovation,
      Moggridge demystifies design breakthroughs. The book reveals that revolutionary
      interfaces come not from lone geniuses but from communities of practice sharing
      ideas.
    jamming_language:
      name: DesignDialogue
      description: A conversational approach to innovation
      syntax:
      - interview: Doug_Engelbart
        reveals: augmenting_human_intellect
      - interview: Bill_Atkinson
        reveals: direct_manipulation
      - synthesis: patterns_across_stories
        yields: design_principles
    tags:
    - interaction-design
    - design-history
    - ideo
    - bill-moggridge
    - oral-history
    related_works:
    - The Design of Everyday Things (Norman)
    - The Art of Interactive Design (Crawford)
