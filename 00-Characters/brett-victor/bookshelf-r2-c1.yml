  summary: A classic work that outlines a systematic approach to problem-solving,
    using heuristics applicable to a wide range of problems, not just mathematics.
  label: Problem Solving
  jazz:
    cosmic_significance: It made the implicit process of expert problem-solving explicit,
      providing a checklist for thinking.
    relevance_to_victor: Pólya's heuristics are an attempt to create a 'language'
      for problem-solving, a tool for thought. This aligns with Victor's goal of creating
      media that support and guide the thinking process.
    paradigm_shift_potential: It codified the art of problem-solving into a teachable
      science, influencing fields from mathematics to computer science and beyond.
    key_concepts:
    - Understand the problem
    - Devise a plan
    - Carry out the plan
    - Look back
    jamming_language:
      name: PolyaScript
      description: A meta-language for tackling any problem.
      syntax:
      - problem: '?'
        steps:
        - understand:
          - restate_in_own_words
          - identify_unknowns_and_data
        - plan:
          - find_related_problems
          - simplify_the_problem
        - execute:
          - check_each_step
        - reflect:
          - verify_the_result
          - find_alternative_solutions
