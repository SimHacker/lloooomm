  summary: A landmark book on education and computing, proposing that children can
    learn to program and, in doing so, learn to think more powerfully. Introduces
    the Logo programming language.
  label: Learning
  jazz:
    cosmic_significance: The foundational text for constructionism. It proposed that
      the computer could be an object-to-think-with, transforming learning from passive
      reception to active creation.
    relevance_to_victor: This is the absolute core of Victor's philosophy. Papert's
      vision of a computational environment for learning is what Victor is trying
      to build. 'Learnable Programming' is a direct descendant of the ideas in Mindstorms.
    paradigm_shift_potential: It reframed the computer's role in education from a
      teaching machine to a tool for creation and discovery, influencing generations
      of educational technologists.
    jamming_language:
