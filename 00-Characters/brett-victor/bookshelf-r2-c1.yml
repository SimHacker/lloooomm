- title: Society of Mind
  id: BretVictor_r2_c1_AI_SocietyOfMind
  author: Marvin Minsky
  publication_year: 1986
  publisher: Simon & Schuster
  isbn: '9780671607401'
  pages: 339
  amazon_link: https://www.amazon.com/Society-Mind-Marvin-Minsky/dp/0671607405
  goodreads_link: https://www.goodreads.com/book/show/298846.Society_of_Mind
  summary: A groundbreaking theory of how the mind works, proposing that intelligence
    is not a single entity but the product of a vast 'society' of mindless, interacting
    agents.
  label: AI
  jazz:
    cosmic_significance: A radical deconstruction of the 'self'. It argues that what
      we call 'mind' is an emergent property of a chaotic collection of simple, competing
      processes.
    relevance_to_victor: This model of mind-as-society, where intelligence emerges
      from the interaction of simple parts, is a powerful metaphor for designing complex
      systems, including user interfaces and programming environments.
    paradigm_shift_potential: It offered a powerful alternative to both symbolic AI
      and connectionism, influencing fields from cognitive science to software architecture.
    jamming_language:
      name: MinskyScript
      description: A grammar for emergent intelligence.
      syntax:
      - society: The_Mind
        agents:
        - Builder
        - Wrecker
        - Near
        - Far
        interaction: competition_and_collaboration
        emergent_property: Consciousness
    tags:
    - cognitive-science
