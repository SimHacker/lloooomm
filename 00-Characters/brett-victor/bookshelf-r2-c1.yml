- title: 'The Art of Interactive Design: A Euphonious and Illuminating Guide to Building
    Successful Software'
  id: BretVictor_r2_c1_InterfaceDesign_TheArtOfInteractiveDesign
  author: Chris Crawford
  publication_year: 2002
  publisher: No Starch Press
  isbn: '9781886411845'
  pages: 408
  amazon_link: https://www.amazon.com/Art-Interactive-Design-Euphonious-Illuminating/dp/1886411840
  goodreads_link: https://www.goodreads.com/book/show/258476.Designing_Interactions
  summary: A philosophical and practical exploration of interactivity by game design
    pioneer Chris Crawford. The book defines what interactivity truly is, how it works,
    why it's important, and how to design software that is genuinely interactive.
    Crawford's conversational style makes complex theoretical concepts accessible
    while challenging conventional interface paradigms.
  label: Interface Design
  key_concepts:
  - Interactivity as conversation
  - The primacy of verbs over nouns
  - Process intensity
  - Interactive storytelling
  jazz:
    cosmic_significance: Crawford elevates interactivity from a feature to a philosophy.
      His central metaphor—that interaction is a cyclic process of listening, thinking,
      and speaking—transforms how we think about human-computer dialogue.
    relevance_to_victor: 'Crawford and Victor share a fundamental belief: computers
      should be dynamic, responsive partners in thought, not static repositories of
      data. Crawford''s emphasis on verbs over nouns directly parallels Victor''s
      focus on behavior over appearance.'
    paradigm_shift_potential: By defining interactivity rigorously and showing why
      most software fails at it, Crawford provides both a critique and a roadmap.
      His work challenges designers to move beyond 'interactive' as a buzzword to
      interaction as a core design principle.
    jamming_language:
      name: InteractionScript
      description: A grammar for conversational computing
      syntax:
      - listen: perceive_user_input
        think: process_meaningfully
        speak: respond_appropriately
        cycle: maintain_conversation
      - verb_primacy: what_can_the_user_DO
        not: what_can_the_user_SEE
    tags:
    - interaction-design
    - game-design
    - chris-crawford
    - verbs
    - process-intensity
    related_works:
    - The Humane Interface (Raskin)
    - Mindstorms (Papert)
- title: Designing Interactions
  id: BretVictor_r2_c1_InterfaceDesign_DesigningInteractions
  author: Bill Moggridge
  publication_year: 2006
  publisher: MIT Press
  isbn: '9780262134743'
