  summary: The leading textbook on artificial intelligence, providing a comprehensive
    overview of the theory and practice of AI, centered on the concept of intelligent
    agents.
  label: AI
  jazz:
    cosmic_significance: The definitive survey of the field of AI, from search algorithms
      to machine learning to robotics. It's the standard text that has educated a
      generation of AI researchers.
    relevance_to_victor: While Victor's work often critiques the disembodied, purely
      symbolic approach of traditional AI, this book provides the essential background
      for understanding the field he is both a part of and reacting against. It defines
      the 'modern approach' that Victor's work offers an alternative to.
    paradigm_shift_potential: It unified the disparate subfields of AI into a coherent
      whole, centered around the concept of intelligent agents acting in an environment.
    jamming_language:
      name: AgentScript
      description: A grammar for rational agents.
      syntax:
      - agent:
          perceives: environment
          via: actuators
          acts_upon: environment
          selects_action: to_maximize_expected_utility
