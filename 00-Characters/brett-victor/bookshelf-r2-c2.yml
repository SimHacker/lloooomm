- title: How Children Learn
  id: BretVictor_r2_c2_Learning_HowChildrenLearn
  author: John Holt
  publication_year: 1967
  publisher: Pitman Publishing
  isbn: '9780273012938'
  pages: 192
  amazon_link: https://www.amazon.com/How-Children-Learn-Classics-Childhood/dp/0201484048
  goodreads_link: https://www.goodreads.com/book/show/84734.How_Children_Learn
  summary: The companion to 'How Children Fail,' this book celebrates the natural,
    joyful, and powerful ways that young children learn through play, exploration,
    and curiosity, without the need for formal instruction.
  label: Learning
  jazz:
    cosmic_significance: A joyful counterpoint to 'How Children Fail,' this book is
      a testament to the innate genius of the young child as a learning machine.
    relevance_to_victor: This provides the positive vision that complements Holt's
      critique. If 'How Children Fail' is the 'why', 'How Children Learn' is the 'what'—a
      description of the natural, curiosity-driven learning that Victor's tools aim
      to support and amplify.
    paradigm_shift_potential: Along with its predecessor, it provided the intellectual
      foundation for the unschooling movement and a powerful argument for trusting
      children as active agents in their own education.
    key_concepts:
    - Learning as exploration
    - The role of play
    - Trusting children
    - Natural learning
    tags:
    - education
    - learning-theory
    - unschooling
    - john-holt
    - child-development
    related_works:
    - How Children Fail (HolT)
    - Mindstorms (Papert)
- title: Learning All the Time
  id: BretVictor_r2_c2_Learning_LearningAllTheTime
  author: John Holt
  publication_year: 1989
  publisher: Addison-Wesley
  isbn: '9780201120097'
  pages: 162
  amazon_link: https://www.amazon.com/Learning-All-Time-John-Holt/dp/0201120097
  goodreads_link: https://www.goodreads.com/book/show/84733.Learning_All_the_Time
  summary: Holt's final book, published posthumously, celebrates children's natural
    ability to learn constantly from everything around them. Through vivid examples
    of children learning to read, write, do math, and understand their world, Holt
    shows how learning happens best when it's self-directed, meaningful, and connected
    to real life.
  label: Learning
  key_concepts:
  - Learning as a natural, continuous process
  - The role of curiosity and interest
  - Learning without teaching
  - Trust in children's abilities
  jazz:
    cosmic_significance: The culmination of Holt's life work—a joyous affirmation
      that learning is as natural as breathing, and happens everywhere, all the time,
      when we don't interfere with it.
    relevance_to_victor: Holt's vision of continuous, self-directed learning prefigures
      Victor's explorable explanations and dynamic media. Both believe that the best
      learning happens when people can directly manipulate and explore ideas on their
      own terms.
    paradigm_shift_potential: By showing learning as a 24/7 activity that needs no
      special buildings or credentials, Holt undermines the entire educational-industrial
      complex. Learning doesn't need to be 'delivered'—it needs to be allowed.
    jamming_language:
      name: EverywhereLearn
      description: A grammar for recognizing learning in daily life
      syntax:
      - child_notices: patterns_in_tiles
        learning_happens: geometry_without_lessons
      - child_asks: why_is_the_sky_blue
        learning_happens: physics_from_curiosity
      - child_plays: with_water_and_cups
        learning_happens: volume_and_conservation
    tags:
    - education
