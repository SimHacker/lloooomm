  summary: A classic and powerful critique of modern schooling, arguing that schools
    foster fear and anxiety, and crush children's natural curiosity and desire to
    learn.
  label: Learning
  jazz:
    cosmic_significance: A heartbreaking and radical book that revealed how the institution
      of school can be profoundly anti-learning.
    relevance_to_victor: Holt's critique of the traditional education system is a
      key motivation for creating alternative, more humane ways of learning. Victor's
      work on explorable explanations can be seen as a direct response to the kind
      of rote, fear-based learning Holt describes.
    paradigm_shift_potential: It was a foundational text for the homeschooling and
      unschooling movements, and continues to inspire educational reformers.
    key_concepts:
    - Fear in the classroom
    - The difference between real and apparent learning
    - The failure of traditional schooling
    - Child-led learning
