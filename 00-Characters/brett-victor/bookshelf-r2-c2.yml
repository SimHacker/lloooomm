- title: The Design of Everyday Things
  id: BretVictor_r2_c2_IndustrialDesign_TheDesignOfEverydayThings
  author: Don Norman
  publication_year: 1988
  publisher: Basic Books
  isbn: '9780465067107'
  pages: 240
  amazon_link: https://www.amazon.com/Design-Everyday-Things-Revised-Expanded/dp/0465050654
  goodreads_link: https://www.goodreads.com/book/show/840.The_Design_of_Everyday_Things
  summary: A foundational text in user-centered design, analyzing why some products
    satisfy customers while others only frustrate them. Introduces key principles
    like affordances, signifiers, and feedback.
  label: Industrial Design
  jazz:
    cosmic_significance: The book that made millions of people realize it's not their
      fault when they can't figure out how to use a door. It's a powerful manifesto
      for human-centered design.
    relevance_to_victor: Norman's focus on making things understandable and usable
      by revealing the underlying model of the system is a core principle in Victor's
      work. A tool should explain itself through its design.
    paradigm_shift_potential: It launched the field of user experience (UX) design
      into the mainstream and gave a name to the frustration we all feel with poorly
      designed objects.
    jamming_language:
      name: NormanScript
      description: A grammar for intuitive interfaces.
      syntax:
      - affordance: a_handle
        signifier: visual_cue_of_handle
        action: pull
        feedback: door_opens
      - mapping: stove_burners_to_controls
        principle: natural_mapping
        result: intuitive_use
    key_concepts:
    - Affordances
    - Signifiers
    - Conceptual Models
    - Feedback
    - Constraints
    tags:
    - ux-design
    - industrial-design
    - human-centered-design
    - cognitive-psychology
    - don-norman
