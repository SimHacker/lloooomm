- title: The Art of the Metaobject Protocol
  id: BretVictor_r2_c3_LispScheme_TheArtOfTheMetaobjectProtocol
  author: Gregor Kiczales, Jim des Rivieres, Daniel G. Bobrow
  publication_year: 1991
  publisher: The MIT Press
  isbn: '9780262610742'
  pages: 345
  amazon_link: https://www.amazon.com/Art-Metabobject-Protocol-Metaobject/dp/0262610744
  goodreads_link: https://www.goodreads.com/book/show/84735.The_Art_of_the_Metaobject_Protocol
  summary: A deep exploration of the concept of a metaobject protocol (MOP), using
    the Common Lisp Object System (CLOS) as its primary example. It shows how a programming
    language can be made open and extensible, allowing programmers to change the language
    itself.
  label: Lisp/Scheme
  jazz:
    cosmic_significance: 'This book reveals the ultimate ''strange loop'' in programming:
      a language that can define its own semantics. It treats the language not as
      a fixed entity, but as a malleable medium.'
    relevance_to_victor: The MOP is perhaps the most powerful embodiment of a 'dynamic
      medium' in programming. It aligns perfectly with Victor's philosophy that creators
      should have control over their tools, and that the language itself is a tool
      to be shaped.
    paradigm_shift_potential: It introduced a powerful and elegant model for language
      design and extension that has influenced many subsequent dynamic languages and
      systems.
    jamming_language:
      name: MOP-Lisp
      description: A grammar for a self-modifying language.
      syntax:
      - define_metaobject: class
        controls: object_creation, slot_access, inheritance
        allows: programmatic_extension_of_language_semantics
    key_concepts:
    - Metaobject Protocol (MOP)
    - Computational Reflection
    - Common Lisp Object System (CLOS)
    tags:
    - lisp
    - metaprogramming
    - object-oriented
    - programming-language-design
    - mit-press
