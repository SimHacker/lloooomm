- title: 'On Lisp: Advanced Techniques for Common Lisp'
  id: BretVictor_r2_c4_LispScheme_OnLispAdvancedTechniquesForCommonLisp
  author: Paul Graham
  publication_year: 1993
  publisher: Prentice Hall
  isbn: '9780130305527'
  pages: 413
  amazon_link: https://www.amazon.com/Lisp-Advanced-Techniques-Common/dp/0130305529
  goodreads_link: https://www.goodreads.com/book/show/123984.On_Lisp
  summary: An exploration of advanced Lisp programming techniques, focusing on bottom-up
    design and the power of macros to create domain-specific languages.
  label: LISP & SCHEME
  jazz:
    cosmic_significance: Reveals that a programming language can be a material to
      be molded, not just a set of instructions to be followed. It teaches the programmer
      to become a language creator.
    relevance_to_victor: Graham's advocacy for building languages tailored to the
      problem domain is a powerful idea that resonates with Victor's desire for tools
      that fit the task, rather than forcing the task to fit the tool.
    key_concepts:
    - Macros
    - Closures
    - Bottom-up programming
    - Domain-specific languages (DSLs)
    paradigm_shift_potential: Empowers programmers to think not just *in* a language,
      but *about* the language, leading to more expressive and powerful solutions.
    tags:
    - lisp
    - macros
    - dsl
    - paul-graham
    - metaprogramming
