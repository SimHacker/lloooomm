- title: The Art of the Metaobject Protocol
  id: BretVictor_r2_c4_LispScheme_TheArtOfTheMetaobjectProtocol
  author: Gregor Kiczales, Jim des Rivières, Daniel G. Bobrow
  publication_year: 1991
  publisher: MIT Press
  isbn: '9780262610742'
  pages: 335
  amazon_link: https://www.amazon.com/Art-Metaobject-Protocol-Gregor-Kiczales/dp/0262610744
  goodreads_link: https://www.goodreads.com/book/show/180631.The_Art_of_the_Metaobject_Protocol
  summary: A seminal work on metaprogramming, showing how to design a programming
    language that can be extended and modified from within itself, using Common Lisp
    as an example.
  label: LISP & SCHEME
  jazz:
    cosmic_significance: 'Reveals the ultimate ''strange loop'' in programming: a
      language that can define its own semantics. It treats the language not as a
      fixed entity, but as a malleable medium.'
    relevance_to_victor: The MOP represents the ultimate 'living system'—a program
      that can understand and change itself. This aligns perfectly with Victor's goal
      of creating dynamic, self-explaining, and malleable software.
    paradigm_shift_potential: Demonstrated that a language doesn't have to be a fixed
      entity, but can be a dynamic, evolving environment for thought.
    key_concepts:
    - Metaobject Protocol (MOP)
    - Computational reflection
    - Language extension
    - Object-oriented programming
    tags:
    - metaprogramming
    - lisp
    - clos
    - object-oriented-design
    - reflection
- title: Structure and Interpretation of Computer Programs
  id: BretVictor_r2_c4_LispScheme_StructureAndInterpretationOfComputerPrograms
  author: Harold Abelson and Gerald Jay Sussman
  publication_year: 1996
  publisher: MIT Press
  isbn: '9780262510875'
  pages: 657
  amazon_link: https://www.amazon.com/Structure-Interpretation-Computer-Programs-Engineering/dp/0262510871
  summary: The classic MIT textbook that introduces fundamental concepts of computer
    science using Scheme, focusing on abstraction and metalinguistic abstraction.
  label: LISP & SCHEME
  jazz:
    cosmic_significance: The book that teaches you that a program is not just a set
      of instructions, but a way of structuring thought. It's philosophy disguised
      as a programming text.
    relevance_to_victor: SICP's focus on building abstractions and understanding computation
      at a deep level is central to Victor's philosophy. It teaches a way of thinking
      about programs as systems, not just code.
    paradigm_shift_potential: Changed the focus of introductory CS from 'how to program'
      to 'how to think about computation'.
