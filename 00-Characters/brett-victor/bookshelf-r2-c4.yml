- title: The Little Schemer
  id: BretVictor_r2_c4_LispScheme_TheLittleSchemer
  author: Daniel P. Friedman, Matthias Felleisen
  publication_year: 1995
  publisher: MIT Press
  isbn: '9780262560993'
  pages: 200
  amazon_link: https://www.amazon.com/Little-Schemer-Daniel-P-Friedman/dp/0262560992
  summary: A unique, question-and-answer approach to learning the fundamentals of
    recursion and the Scheme programming language.
  label: LISP & SCHEME
  jazz:
    cosmic_significance: Teaches not just a language, but a way of thinking. Its Socratic
      method forces the reader to build an intuition for recursion from the ground
      up.
    relevance_to_victor: Praised by Victor as 'one of the most unique and effective
      pedagogic books ever written.' Its method of teaching by asking questions and
      building up concepts from first principles is a model for 'learnable programming'.
    paradigm_shift_potential: For many, this is the book that truly teaches recursion
      in a way that sticks. It's a testament to the power of pedagogy in a technical
      field.
    key_concepts:
    - Recursion
    - Functional programming
    - The Socratic method
    - The Five Rules of Recursion
