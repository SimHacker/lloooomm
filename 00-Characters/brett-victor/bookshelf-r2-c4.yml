- title: 'Where the Action Is: The Foundations of Embodied Interaction'
  id: BretVictor_r2_c4_HCI_WhereTheActionIs
  author: Paul Dourish
  publication_year: 2001
  publisher: The MIT Press
  isbn: '9780262541785'
  pages: 256
  amazon_link: https://www.amazon.com/Where-Action-Foundations-Embodied-Interaction/dp/0262541785
  goodreads_link: https://www.goodreads.com/book/show/298844.Where_the_Action_Is
  summary: A foundational text for embodied interaction, drawing on phenomenology
    and social science to argue that interaction is fundamentally rooted in the physical
    and social world.
  label: HCI
  jazz:
    cosmic_significance: Brought the body back into HCI. It argued that we can't understand
      interaction by just looking at screen pixels; we have to look at how people
      exist and act in a shared, physical world.
    relevance_to_victor: Victor's work often involves physical interaction and tangible
      interfaces. Dourish's book provides the theoretical and philosophical underpinning
      for why this embodied approach is so powerful.
    paradigm_shift_potential: Helped shift HCI from a focus on abstract cognitive
      models to a focus on embodied, situated, and social interaction.
    key_concepts:
    - Embodied interaction
    - Tangible computing
    - Social computing
    - Phenomenology
    tags:
