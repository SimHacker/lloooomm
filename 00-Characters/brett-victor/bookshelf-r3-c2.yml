# Bookshelf section from the third row, second column of the main image.
# A collection focused on cognition, consciousness, and the philosophy of mind.
# The label is identified from the photo: COGNITION & METACOGNITION.

character: "brett-victor"
bookshelf_section: "r3-c2"
theme: "Cognition, Consciousness, and the Architecture of Mind"
books:
  - title: "Frames of Mind: The Theory of Multiple Intelligences"
    author: "Howard Gardner"
    label: "Cognition & Metacognition"
    summary: "Proposes the theory of multiple intelligences, challenging the traditional view of a single, general intelligence."
  - title: "Origins of the Modern Mind: Three Stages in the Evolution of Culture and Cognition"
    author: "Merlin Donald"
    label: "Cognition & Metacognition"
    summary: "A theory on the evolution of the human mind, from primate to modern human consciousness."
  - title: "Gödel, Escher, Bach: an Eternal Golden Braid"
    author: "Douglas R. Hofstadter"
    label: "Cognition & Metacognition"
    summary: "A Pulitzer Prize-winning book that explores concepts of intelligence, consciousness, and self-reference through the works of a logician, artist, and composer."
  - title: "The Origin of Consciousness in the Breakdown of the Bicameral Mind"
    author: "Julian Jaynes"
    label: "Cognition & Metacognition"
    summary: "A controversial theory proposing that ancient humans did not have consciousness as we know it, but experienced auditory hallucinations as the voice of gods."
  - title: "Flow: The Psychology of Optimal Experience"
    author: "Mihaly Csikszentmihalyi"
    label: "Cognition & Metacognition"
    summary: "Introduces the concept of 'flow', a state of complete immersion and enjoyment in an activity."
  - title: "The Master and His Emissary: The Divided Brain and the Making of the Western World"
    author: "Iain McGilchrist"
    label: "Cognition & Metacognition"
    summary: "Argues that the two hemispheres of the brain have different, and sometimes conflicting, ways of understanding the world."
  - title: "The Quest for Consciousness: A Neurobiological Approach"
    author: "Christof Koch"
    label: "Cognition & Metacognition"
    summary: "A scientific exploration of the neural basis of consciousness."
  - title: "In Search of Memory: The Emergence of a New Science of Mind"
    author: "Eric R. Kandel"
    label: "Cognition & Metacognition"
    summary: "A Nobel laureate's account of his life's work on the molecular mechanisms of memory."
  - title: "The Society of Mind"
    author: "Marvin Minsky"
    label: "Cognition & Metacognition"
    summary: "A theory of mind that posits intelligence as the product of a vast society of simple, non-intelligent agents."
  - title: "Mind Wide Open: Your Brain and the Neuroscience of Everyday Life"
    author: "Steven Johnson"
    label: "Cognition & Metacognition"
    summary: "An exploration of the latest findings in neuroscience and how they relate to our everyday experiences."
  - title: "The Meme Machine"
    author: "Susan Blackmore"
    label: "Cognition & Metacognition"
    summary: "An exploration of the theory of memes, cultural analogues to genes, and their role in human evolution."
  - title: "Understanding Computers and Cognition: A New Foundation for Design"
    author: "Terry Winograd & Fernando Flores"
    label: "Cognition & Metacognition"
    summary: "A critique of the rationalistic tradition in artificial intelligence and a proposal for a new approach to computer design."
  - title: "Models of My Life"
    author: "Herbert A. Simon"
    label: "Cognition & Metacognition"
    summary: "The autobiography of a Nobel laureate and pioneer in artificial intelligence, cognitive science, and management."
  - title: "Surfaces and Essences: Analogy as the Fuel and Fire of Thinking"
    author: "Douglas Hofstadter & Emmanuel Sander"
    label: "Cognition & Metacognition"
    summary: "Argues that analogy is the core of all thinking."
  - title: "Women, Fire, and Dangerous Things: What Categories Reveal About the Mind"
    author: "George Lakoff"
    label: "Cognition & Metacognition"
    summary: "A key text in cognitive linguistics, arguing that human thought is metaphorical and imaginative."
  - title: "Metaphors We Live By"
    author: "George Lakoff & Mark Johnson"
    label: "Cognition & Metacognition"
    summary: "Argues that metaphor is not just a poetic device but a fundamental aspect of human thought and language."
  - title: "The Symbolic Species: The Co-evolution of Language and the Brain"
    author: "Terrence W. Deacon"
    label: "Cognition & Metacognition"
    summary: "A theory of the evolution of human language, proposing that it co-evolved with the human brain."
  - title: "The Way We Think: Conceptual Blending and the Mind's Hidden Complexities"
    author: "Gilles Fauconnier & Mark Turner"
    label: "Cognition & Metacognition"
    summary: "Presents the theory of conceptual blending as a fundamental cognitive operation."
  - title: "Origins of Human Communication"
    author: "Michael Tomasello"
    label: "Cognition & Metacognition"
    summary: "Argues that human communication is unique in its cooperative nature, based on shared intentionality." 