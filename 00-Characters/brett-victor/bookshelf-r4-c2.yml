character: "brett-victor"
bookshelf_section: "r4c2"
theme: "Creativity, Discovery, and the Philosophy of Science"
books:
  - title: "Making Ideas Happen: Overcoming the Obstacles Between Vision and Reality"
    author: "Scott Belsky"
    label: "Creativity & Ideas"
    summary: "A practical guide to executing creative ideas, with a focus on organization, community, and leadership."
  - title: "Common As Air: Revolution, art, and ownership"
    author: "Lewis Hyde"
    label: "Creativity & Ideas"
    summary: "An exploration of the nature of cultural commons and the importance of shared knowledge."
  - title: "The Gift: Creativity and the Artist in the Modern World"
    author: "Lewis Hyde"
    label: "Creativity & Ideas"
    summary: "A classic work on the nature of creativity, arguing that art operates as a gift economy."
  - title: "Where Good Ideas Come From: The Natural History of Innovation"
    author: "Steven Johnson"
    label: "Creativity & Ideas"
    summary: "An exploration of the environments and patterns that foster innovation and creativity."
  - title: "The Act of Creation"
    author: "Arthur Koestler"
    label: "Creativity & Ideas"
    summary: "A study of the processes of discovery, invention, and artistic creation, introducing the concept of 'bisociation'."
  - title: "Good Work: When Excellence and Ethics Meet"
    author: "Howard Gardner, Mihaly Csikszentmihalyi, William Damon"
    label: "Creativity & Ideas"
    summary: "An investigation into the nature of 'good work' - work that is both excellent and ethically responsible."
  - title: "How to Solve It: A New Aspect of Mathematical Method"
    author: "G. Polya"
    label: "Scientific Discovery"
    summary: "A classic guide to problem-solving, outlining a four-step method for tackling mathematical problems."
  - title: "Induction and Analogy in Mathematics"
    author: "G. Polya"
    label: "Scientific Discovery"
    summary: "Volume I of 'Mathematics and Plausible Reasoning', exploring the role of induction and analogy in mathematical discovery."
  - title: "Patterns of Plausible Inference"
    author: "G. Polya"
    label: "Scientific Discovery"
    summary: "Volume II of 'Mathematics and Plausible Reasoning', focusing on the logic of plausible inference."
  - title: "Mathematical Discovery: On Understanding, Learning, and Teaching Problem Solving"
    author: "G. Polya"
    label: "Scientific Discovery"
    summary: "A two-volume work that delves deeper into the psychology and pedagogy of mathematical problem-solving."
  - title: "And Suddenly the Inventor Appeared: TRIZ, the Theory of Inventive Problem Solving"
    author: "Genrich Altshuller"
    label: "Scientific Discovery"
    summary: "An introduction to the theory of inventive problem solving (TRIZ), a systematic approach to innovation."
  - title: "Creating Scientific Concepts"
    author: "Nancy J. Nersessian"
    label: "Scientific Discovery"
    summary: "A cognitive-historical approach to understanding how scientific concepts are created and change over time."
  - title: "The Art of Doing Science and Engineering: Learning to Learn"
    author: "Richard Hamming"
    label: "Scientific Discovery"
    summary: "A series of lectures on how to conduct great research, from a pioneer in computer science and telecommunications."
  - title: "What Engineers Know and How They Know It: Analytical Studies from Aeronautical History"
    author: "Walter G. Vincenti"
    label: "Scientific Discovery"
    summary: "An exploration of the nature of engineering knowledge, using case studies from the history of aviation."
  - title: "The Structure of Scientific Revolutions"
    author: "Thomas S. Kuhn"
    label: "Philosophy of Science"
    summary: "A landmark work in the history and philosophy of science that introduced the concept of the 'paradigm shift'."
  - title: "The Road Since Structure: Philosophical Essays, 1970-1993, with an Autobiographical Interview"
    author: "Thomas S. Kuhn"
    label: "Philosophy of Science"
    summary: "A collection of essays that further develop and clarify the ideas presented in 'The Structure of Scientific Revolutions'."
  - title: "Against Method"
    author: "Paul Feyerabend"
    label: "Philosophy of Science"
    summary: "An anarchist critique of the scientific method, arguing that there is no single, universally valid method for science."
  - title: "The Sciences of the Artificial"
    author: "Herbert A. Simon"
    label: "Philosophy of Science"
    summary: "A classic work on the study of artificial systems, with implications for computer science, cognitive psychology, and economics."
  - title: "The Origins of Invention: A Study of Industry Among Primitive Peoples"
    author: "Otis T. Mason"
    label: "Scientific Discovery"
    summary: "A classic anthropological study of the origins of technology and invention in pre-industrial societies."
  - title: "Science in Action: How to Follow Scientists and Engineers Through Society"
    author: "Bruno Latour"
    label: "Philosophy of Science"
    summary: "A key text in actor-network theory, offering a new perspective on the social construction of scientific knowledge." 