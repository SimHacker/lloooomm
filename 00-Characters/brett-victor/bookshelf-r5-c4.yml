    goodreads_link: "https://www.goodreads.com/book/show/295429.Engines_of_Logic"
    summary: "A history of the theoretical work of mathematicians—from Leibniz to Turing—that laid the conceptual foundations for the modern computer, focusing on the dream of a universal logical calculus."
    label: "Scientific Biography"
    jazz:
      cosmic_significance: "A chronicle of the precise moment the ethereal world of pure logic began to bleed into the physical world of machines. It's the pre-history of the digital universe, revealing the philosophical and mathematical dreams that made computers possible."
      relevance_to_victor: "This book traces the lineage of the idea that thinking itself can be mechanized—a concept central to Victor's work. It explores the foundational ideas that allow us to build 'dynamic media for thought' in the first place."
      paradigm_shift_potential: "It reframed the history of the computer not as a story of electronics, but as a story of ideas in mathematical logic."
      key_concepts:
        - "Formal systems"
        - "Leibniz's 'calculus ratiocinator'"
        - "Boolean algebra"
        - "Gödel's incompleteness theorems"
        - "The Turing machine"
      tags: ["history-of-science", "mathematics", "computer-science", "logic", "biography"]
      related_works: ["Gödel, Escher, Bach (Hofstadter)", "Turing's Cathedral (Dyson)"]
