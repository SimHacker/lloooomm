      tags: ["environmentalism", "science-writing", "thought-experiment", "ecology", "post-human"]
  - title: "Whole Earth Discipline: An Ecopragmatist Manifesto"
    id: "BretVictor_r6_c2_Eco_WholeEarthDisciplineAnEcopragmatistManifesto"
    author: "Stewart Brand"
    publication_year: 2009
    publisher: "Viking"
    isbn: "9780670021215"
    pages: 336
    amazon_link: "https://www.amazon.com/Whole-Earth-Discipline-Ecopragmatist-Manifesto/dp/0143118285"
    goodreads_link: "https://www.goodreads.com/book/show/6411373-whole-earth-discipline"
    summary: "A revised perspective on environmentalism from the creator of the Whole Earth Catalog, embracing technology and pragmatic solutions. Brand argues that cities are green, nuclear power is necessary, genetic engineering is essential, and geoengineering is probably inevitable."
    label: "Eco"
    jazz:
      cosmic_significance: "The counterculture icon who gave us 'We are as gods and might as well get good at it' returns decades later to say 'We are as gods and HAVE to get good at it.' It's environmentalism for grown-ups."
      relevance_to_victor: "Brand's pragmatic, tools-based approach to solving global problems resonates deeply with Victor's philosophy. Both believe in empowering individuals with better tools rather than waiting for top-down solutions."
      paradigm_shift_potential: "Shattered the romantic environmentalist consensus by advocating for cities, nukes, and GMOs. Forced greens to confront their anti-technology bias and think like engineers."
      jamming_language:
        name: "EcoPragmatism"
        description: "A grammar for environmental solutions that actually work"
        syntax:
          - romantic_green:
              cities: "bad"
              nuclear: "evil"
              gmos: "frankenfood"
              result: "beautiful_failure"
          - pragmatic_green:
              cities: "efficient_density"
              nuclear: "carbon_free_baseload"
              gmos: "feed_the_world"
              result: "ugly_success"
          - brand_synthesis:
              principle: "what_works"
              method: "measure_dont_moralize"
              goal: "10_billion_people_living_well"
              wink_energy: 9.0
      key_concepts:
        - "Ecopragmatism"
        - "Cities as green technology"
        - "Nuclear renaissance"
        - "Genetic rescue"
        - "Geoengineering as Plan B"
      tags: ["environmentalism", "pragmatism", "stewart-brand", "whole-earth", "technology", "contrarian"]
      related_works: ["The Whole Earth Catalog (Brand)", "What Technology Wants (Kelly)", "Ecomodernist Manifesto"]
  - title: "Sustainable Energy - Without the Hot Air"
    id: "BretVictor_r6_c2_Eco_SustainableEnergy-WithoutTheHotAir"
    author: "David J.C. MacKay"
    publication_year: 2009
    publisher: "UIT Cambridge"
    isbn: "9780954452933"
    pages: 384
    amazon_link: "https://www.amazon.com/Sustainable-Energy-Without-Hot-Air/dp/0954452933"
    url: "http://www.withouthotair.com/"
    summary: "A data-driven assessment of renewable energy options that cuts through rhetoric with simple physics and arithmetic. MacKay, a Cambridge physicist, provides a framework for understanding energy consumption and production using consistent units and back-of-the-envelope calculations."
    label: "Eco"
    jazz:
      cosmic_significance: "The book that killed energy bullshit with arithmetic. MacKay showed that you can't solve climate change with wishful thinking—you need numbers, and the numbers must add up."
      relevance_to_victor: "This is exactly the kind of work Victor advocates: making complex systems understandable through clear visualization and honest calculation. MacKay's approach—'numbers, not adjectives'—exemplifies Victor's philosophy of grounding abstractions in concrete reality."
      paradigm_shift_potential: "Transformed energy debates from ideological shouting matches to engineering problems. Showed that simple arithmetic can cut through complex political rhetoric."
      jamming_language:
        name: "EnergyBalance"
        description: "A grammar for honest energy accounting"
        syntax:
          - consumption:
              transport: "40 kWh/day/person"
              heating: "40 kWh/day/person"
              electricity: "18 kWh/day/person"
              total: "~100 kWh/day/person"
          - production:
              wind: "20 kWh/day/person (if cover 10% of country)"
              solar: "50 kWh/day/person (if cover 5% of country)"
              nuclear: "40 kWh/day/person (with 40 GW capacity)"
              reality_check: "the_map_is_full"
          - mackay_law:
              statement: "numbers_not_adjectives"
              corollary: "if_everyone_does_a_little_we_achieve_a_little"
              wink_energy: 9.8
      key_concepts:
        - "Energy consumption stack"
        - "Renewable energy limits"
        - "Power per unit area"
        - "The numbers must add up"
        - "Plans that add up"
      tags: ["energy", "climate-change", "physics", "sustainability", "data-visualization", "open-access"]
      related_works: ["Climate Change: What Everyone Needs to Know", "The Limits to Growth", "Factor Four"]
