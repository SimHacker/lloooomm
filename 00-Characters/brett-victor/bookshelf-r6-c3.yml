- title: Introduction to VLSI Systems
  id: BretVictor_r6_c3_Hardware_IntroductionToVLSISystems
  author: Carver Mead, Lynn Conway
  publication_year: 1980
  publisher: Addison-Wesley
  isbn: '9780201043587'
  pages: 396
  amazon_link: https://www.amazon.com/Introduction-VLSI-Systems-Carver-Mead/dp/0201043580
  goodreads_link: https://www.goodreads.com/book/show/847053.Introduction_to_VLSI_Systems
  summary: The revolutionary textbook that democratized chip design, introducing simplified design rules and methodologies
    (the 'lambda-based' rules) that allowed non-physicists to design integrated circuits.
  label: Hardware
  jazz:
    cosmic_significance: The book that broke the priesthood of chip design. It transformed VLSI design from a black art practiced
      by a few semiconductor companies into a discipline that could be taught at universities, sparking an explosion of innovation.
    relevance_to_victor: The 'Mead-Conway revolution' is a perfect example of what happens when you give powerful tools to
      a wider audience—a central theme in Victor's work. The book itself is a 'tool for thought' that changed how people thought
      about computation.
    paradigm_shift_potential: It launched the fabless semiconductor industry and made modern, complex microprocessors possible.
    jamming_language:
      name: LambdaCAD
      description: A grammar for scalable digital design.
      syntax:
      - layer: polysilicon
        rule: width(2λ)
        purpose: gate
      - layer: metal1
        rule: spacing(3λ)
        purpose: interconnect
      - component: inverter
        composition:
        - pull_up_transistor
        - pull_down_transistor
    key_concepts:
    - VLSI design
    - Lambda-based design rules
    - Structured design
    - MOS technology
    - The Mead-Conway revolution
