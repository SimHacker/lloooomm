description: Books that were incorrectly added to Brett Victor's bookshelf during
  enrichment
total_count: 21
shelves:
  r2-c1:
    extracted_count: 3
    books:
    - title: 'Vehicles: Experiments in Synthetic Psychology'
      id: BretVictor_r2_c1_AI_VehiclesExperimentsInSyntheticPsychology
      author: Valentino Braitenberg
      publication_year: 1984
      publisher: The MIT Press
      isbn: '9780262521123'
      pages: 168
      amazon_link: https://www.amazon.com/Vehicles-Experiments-Synthetic-Psychology-Bradford/dp/0262521121
      goodreads_link: https://www.goodreads.com/book/show/298845.Vehicles
      summary: A series of thought experiments that explores how complex, seemingly
        intelligent behaviors can emerge from simple, well-understood components.
      label: AI
      jazz:
        cosmic_significance: A beautiful and accessible demonstration of emergent
          complexity, showing that 'intelligent' behavior doesn't require a complex
          internal model of the world.
        relevance_to_victor: Braitenberg's method of understanding by building and
          observing simple systems is a powerful example of the kind of 'dynamic thinking'
          Victor advocates for. It's a direct counterpoint to trying to understand
          complex systems through static, formal descriptions alone.
        paradigm_shift_potential: It provided a powerful intuition for emergent behavior
          and the 'subsumption architecture' that would become influential in robotics
          and AI.
        jamming_language:
          name: BraitenCircuit
          description: A grammar for emergent behavior.
          syntax:
          - vehicle_2b:
              sensors:
              - light_sensor_L
              - light_sensor_R
              motors:
              - motor_L
              - motor_R
              wiring:
              - from: sensor_L
                to: motor_L
                effect: excitatory
              - from: sensor_R
                to: motor_R
                effect: excitatory
              emergent_behavior: cowardice
        tags:
        - cybernetics
        - ai
        - robotics
        - emergent-behavior
        - complex-systems
        - thought-experiment
    - title: Thinking, Fast and Slow
      id: BretVictor_r2_c1_Thinking_ThinkingFastAndSlow
      author: Daniel Kahneman
      publication_year: 2011
      publisher: Farrar, Straus and Giroux
      isbn: '9780374275631'
      pages: 512
      amazon_link: https://www.amazon.com/Thinking-Fast-Slow-Daniel-Kahneman/dp/0374275637
      goodreads_link: https://www.goodreads.com/book/show/11468377-thinking-fast-and-slow
      summary: 'A summary of decades of research by Kahneman and Amos Tversky, introducing
        the concept of two systems of thought: the fast, intuitive ''System 1'' and
        the slow, deliberate ''System 2''.'
      label: Thinking
      jazz:
        cosmic_significance: A tour of the quirks and biases of the human mind, revealing
          that we are far less rational than we believe. It's a user manual for our
          own buggy wetware.
        relevance_to_victor: Victor's work is all about designing tools that augment
          'System 2' thinking. By understanding the biases and limitations of 'System
          1,' we can design media that help us think more clearly and avoid cognitive
          traps.
        paradigm_shift_potential: It brought the insights of behavioral economics
          and cognitive psychology to a mass audience, fundamentally changing how
          many people think about thinking.
        jamming_language:
          name: CognitiveBiasLinter
          description: A linter for human thought processes.
          syntax:
          - bias: Anchoring
            trigger: initial_piece_of_information
            remediation: consciously_adjust_away
          - bias: Availability_Heuristic
            trigger: vivid_or_recent_example
            remediation: seek_out_base_rate_statistics
        tags:
        - psychology
        - cognitive-science
        - behavioral-economics
        - decision-making
        - daniel-kahneman
    - title: 'Gödel, Escher, Bach: An Eternal Golden Braid'
      id: BretVictor_r2_c1_Thinking_GodelEscherBachAnEternalGoldenBraid
      author: Douglas R. Hofstadter
      publication_year: 1979
      publisher: Basic Books
      isbn: '9780465026562'
      pages: 777
      amazon_link: https://www.amazon.com/G%C3%B6del-Escher-Bach-Eternal-Golden/dp/0465026567
      goodreads_link: https://www.goodreads.com/book/show/24113.G_del_Escher_Bach
      summary: A Pulitzer Prize-winning book that explores the nature of consciousness
        and intelligence through a series of dialogues and fugues inspired by the
        work of Gödel, Escher, and Bach, focusing on the concept of 'Strange Loops'.
      label: Thinking
      jazz:
        cosmic_significance: A monumental, unclassifiable work that weaves together
          mathematics, art, music, and computer science to explore the mysteries of
          self-reference and consciousness.
        relevance_to_victor: GEB is the ultimate exploration of how meaning can emerge
          from formal systems. Its playful, recursive structure and its deep dive
          into the nature of intelligence and representation are all deeply resonant
          with Victor's work.
        paradigm_shift_potential: It's a book that has been known to change people's
          lives, inspiring countless readers to see the deep connections between seemingly
          disparate fields.
        jamming_language:
          name: GEBScript
          description: A grammar for self-referential systems.
          syntax:
          - strange_loop:
              level_1: This statement
              level_2: refers to itself
              result: a_tangled_hierarchy
              emergent_property: consciousness
        key_concepts:
        - Self-reference and Strange Loops
        - Isomorphism
        - Recursion
        - Artificial intelligence
        - Formal systems and their limitations (Gödel's Incompleteness Theorems)
        tags:
        - philosophy
        - mathematics
        - computer-science
        - art
        - music
        - cognitive-science
        - pulitzer-prize
        related_works:
        - The Mind's I (Hofstadter & Dennett)
