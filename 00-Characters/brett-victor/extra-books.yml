    extracted_count: 1
    books:
    - title: The Inmates Are Running the Asylum
      id: BretVictor_r2_c2_InterfaceDesign_TheInmatesAreRunningTheAsylum
      author: Alan Cooper
      publication_year: 1999
      publisher: Sams Publishing
      isbn: '9780672316494'
      pages: 261
      amazon_link: https://www.amazon.com/Inmates-Are-Running-Asylum-High-Tech/dp/0672316498
      goodreads_link: https://www.goodreads.com/book/show/55519.The_Inmates_Are_Running_the_Asylum
      summary: A provocative argument that high-tech products are difficult to use
        because they are designed by programmers, and a call for interaction design
        as a distinct discipline.
      label: Interface Design
      jazz:
        cosmic_significance: 'A fiery manifesto that diagnosed a core sickness in
          the software industry: that the people building the products (programmers)
          are fundamentally unsuited to designing them for other people.'
        relevance_to_victor: This book champions the role of the designer as an advocate
          for the user, separate from the engineer. This separation of concerns is
          critical to creating humane technology, a central theme in Victor's work.
        paradigm_shift_potential: It gave business leaders a compelling, profit-driven
          reason to invest in design, and helped establish interaction design as a
          crucial and distinct discipline within the tech industry.
        jamming_language:
          name: PersonaScript
          description: A grammar for designing for others, not yourself.
          syntax:
          - define_persona: Sally, the busy sales manager
            identify_goals:
            - close_deals_quickly
            - not_feel_stupid_in_front_of_clients
            design_for_goals: not_for_features
            result: a_product_sally_loves
        key_concepts:
        - Personas
        - Goal-Directed Design
        - Cognitive Friction
        - Dancing Bearware
        tags:
        - interaction-design
        - ux-design
        - product-management
        - software-development
        - alan-cooper
        related_works:
        - About Face 2.0 (Cooper)
  r2-c3:
    extracted_count: 1
    books:
    - title: LISP in Small Pieces
      id: BretVictor_r2_c3_LispScheme_LISPInSmallPieces
      author: Christian Queinnec
      publication_year: 1996
      publisher: Cambridge University Press
      isbn: '9780521562472'
      pages: 528
      amazon_link: https://www.amazon.com/Lisp-Small-Pieces-Christian-Queinnec/dp/0521545668
      goodreads_link: https://www.goodreads.com/book/show/783933.Lisp_in_Small_Pieces
      summary: An in-depth look at the implementation of Lisp and Scheme, showing
        how to build various interpreters and compilers for the language.
      label: Lisp/Scheme
      jazz:
        cosmic_significance: A masterclass in the art of building interpreters. It
          takes the core ideas of Lisp—code as data—and shows how this single, powerful
          idea can be realized in a dozen different ways.
        relevance_to_victor: Like the Dragon Book, this provides a deep understanding
          of language implementation, but from a more dynamic and conceptually-focused
          perspective. It's about understanding a medium by building it.
        paradigm_shift_potential: For many, it's the book that makes the ideas in
          SICP 'click' on a deeper, implementation-focused level.
        key_concepts:
        - Interpreters
        - Compilers
        - Continuation-Passing Style (CPS)
        - Macros
        tags:
        - lisp
        - scheme
        - compilers
        - interpreters
        - programming-languages
        - computer-science
        related_works:
        - Structure and Interpretation of Computer Programs (Sussman & Abelson)
        - 'Compilers: Principles, Techniques, and Tools (Aho, et al.)'
  r2-c4:
    extracted_count: 2
    books:
    - title: 'The Image: A Guide to Pseudo-events in America'
      id: BretVictor_r2_c4_Culture_TheImageAGuideToPseudoEventsInAmerica
      author: Daniel J. Boorstin
      publication_year: 1961
      publisher: Vintage
      isbn: '9780679741800'
      pages: 336
      amazon_link: https://www.amazon.com/Image-Guide-Pseudo-Events-America/dp/0679741801
      goodreads_link: https://www.goodreads.com/book/show/130182.The_Image
      summary: A critical examination of how modern American culture has become dominated
        by 'pseudo-events'—staged, artificial events designed to be reported—and the
        resulting confusion between image and reality.
      label: Culture
      jazz:
        cosmic_significance: An early and prescient warning about the hollowing-out
          of reality in a media-saturated age. Boorstin saw the simulation before
          Baudrillard made it famous.
        relevance_to_victor: This critique of passive media consumption and manufactured
          reality provides a strong 'why' for Victor's work. If our current media
          create a world of pseudo-events, we need new media that allow for genuine
          experience and creation.
        paradigm_shift_potential: It introduced the concept of the 'pseudo-event'
          and provided a framework for understanding the then-emerging culture of
          celebrity and public relations.
        tags:
        - media-criticism
        - sociology
        - american-history
        - postmodernism
        - daniel-boorstin
        related_works:
        - Amusing Ourselves to Death (Postman)
        - Understanding Media (McLuhan)
    - title: The Semiotic Engineering of Human-Computer Interaction
      id: BretVictor_r2_c4_HCI_TheSemioticEngineeringOfHumanComputerInteraction
      author: Clarisse de Souza
      publication_year: 2005
      publisher: The MIT Press
      isbn: '9780262042201'
      pages: 288
      amazon_link: https://www.amazon.com/Semiotic-Engineering-Human-Computer-Interaction-Press/dp/0262042207
      goodreads_link: https://www.goodreads.com/book/show/28054.The_Semiotic_Engineering_of_Human_Computer_Interaction
      summary: A theoretical framework for HCI that treats interaction as a form of
        communication between designers and users, mediated by the interface.
      label: HCI
      jazz:
        cosmic_significance: It formalizes the idea that every interface is a message
          from its creator to its user, saying 'this is how I, your designer, saw
          you, your problems, and the ways you could solve them'.
        relevance_to_victor: This aligns with Victor's emphasis on the responsibility
          of the creator. The design of a tool is a form of communication, and Semiotic
          Engineering provides a rigorous way to analyze that communication.
        paradigm_shift_potential: Offered a new, communication-centric theory for
          HCI, moving beyond purely cognitive or engineering-based models.
        key_concepts:
        - Human-computer interaction as communication
        - Metacommunication
        - The designer's deputy
        tags:
        - hci
        - semiotics
        - design-theory
        - user-interface-design
        related_works:
        - The Design of Everyday Things (Norman)
