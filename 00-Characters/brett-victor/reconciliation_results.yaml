      author: Merlin Donald
      goodreads_link: https://www.goodreads.com/book/show/771055.Origins_of_the_Modern_Mind
      id: BretVictor_r3_c2_CognitionMetacognition_OriginsOfTheModernMindThreeStagesInTheEvolutionOfCultureAndCognition
      isbn: '9780674644847'
      jazz:
        cosmic_significance: Donald's work bridges the gap between biological and
          cultural evolution, showing how human consciousness is not just a brain
          phenomenon but a hybrid of biology and technology. His concept of 'external
          memory' predicts our current symbiosis with digital devices.
        jamming_language:
          description: A framework for understanding representational revolutions
          name: CognitiveTransitionScript
          syntax:
          - representation: event_memories
            retrieval: environmental_cues_only
            stage: EPISODIC
          - representation: body_models + gesture
            retrieval: voluntary_autocueing
            stage: MIMETIC
          - representation: words + stories
            retrieval: lexical_invention
            stage: MYTHIC
          - representation: external_symbols
            retrieval: unlimited_reformatting
            stage: THEORETIC
        key_concepts:
        - 'Episodic culture: ape-like event perception'
        - 'Mimetic culture: whole-body modeling, gesture, ritual'
        - 'Mythic culture: language, narrative, oral tradition'
        - 'Theoretic culture: external symbols, writing, science'
        - External memory fields and cognitive offloading
        - Autocueing and voluntary memory access
        paradigm_shift_potential: Reframes human evolution as a series of representational
          revolutions rather than just biological changes. Suggests that we're still
          evolving cognitively through our tools, and that the invention of computers
          may represent a fourth transition.
        related_works:
        - The Symbolic Species (Deacon)
        - A Mind So Rare (Donald)
        - The Extended Mind (Clark & Chalmers)
        relevance_to_victor: Donald's third transition—external symbolic storage—is
          directly relevant to Victor's work on computational media. When Victor creates
          new representations and tools for thought, he's participating in the ongoing
          evolution of human cognition through external memory systems.
