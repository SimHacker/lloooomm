        - Mindstorms (Papert)
        relevance_to_victor: Gardner's multiple intelligences directly relate to Victor's
          vision of creating different representations for different modes of thinking.
          Just as Gardner argues for spatial, kinesthetic, and musical intelligences,
          Victor designs tools that engage these different cognitive modalities—not
          just the logical-linguistic.
