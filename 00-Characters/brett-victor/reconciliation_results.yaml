      id: BretVictor_r2_c2_Learning_LearningAllTheTime
      isbn: '9780201120097'
      jazz:
        cosmic_significance: The culmination of Holt's life work—a joyous affirmation
          that learning is as natural as breathing, and happens everywhere, all the
          time, when we don't interfere with it.
        jamming_language:
          description: A grammar for recognizing learning in daily life
          name: EverywhereLearn
          syntax:
          - child_notices: patterns_in_tiles
            learning_happens: geometry_without_lessons
          - child_asks: why_is_the_sky_blue
            learning_happens: physics_from_curiosity
          - child_plays: with_water_and_cups
            learning_happens: volume_and_conservation
        paradigm_shift_potential: By showing learning as a 24/7 activity that needs
          no special buildings or credentials, Holt undermines the entire educational-industrial
          complex. Learning doesn't need to be 'delivered'—it needs to be allowed.
        related_works:
        - How Children Learn (Holt)
        - How Children Fail (Holt)
        - Growing Without Schooling (magazine)
        relevance_to_victor: Holt's vision of continuous, self-directed learning prefigures
          Victor's explorable explanations and dynamic media. Both believe that the
          best learning happens when people can directly manipulate and explore ideas
          on their own terms.
        tags:
        - education
        - unschooling
        - john-holt
        - natural-learning
        - child-led-learning
      key_concepts:
      - Learning as a natural, continuous process
      - The role of curiosity and interest
      - Learning without teaching
      - Trust in children's abilities
      label: Learning
      pages: 162
      publication_year: 1989
      publisher: Addison-Wesley
      summary: Holt's final book, published posthumously, celebrates children's natural
        ability to learn constantly from everything around them. Through vivid examples
        of children learning to read, write, do math, and understand their world,
        Holt shows how learning happens best when it's self-directed, meaningful,
        and connected to real life.
      title: Learning All the Time
