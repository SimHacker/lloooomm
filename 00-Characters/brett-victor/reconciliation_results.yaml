    full_data:
      amazon_link: https://www.amazon.com/Show-Me-Numbers-Designing-Enlighten/dp/0970601972
      author: Stephen Few
      goodreads_link: https://www.goodreads.com/book/show/369798.Show_Me_the_Numbers
      id: BretVictor_r3_c1_InformationDesign_ShowMeTheNumbersDesigningTablesAndGraphsToEnlighten
      isbn: '9780970601971'
      jazz:
        cosmic_significance: While Tufte provides the philosophy and Cleveland the
          science, Few provides the pragmatic bridge—showing practitioners exactly
          how to apply perceptual principles to everyday business communication. It's
          the 'how-to' manual for data visualization done right.
        jamming_language:
          description: A decision tree for effective data display
          name: ClarityScript
          syntax:
          - query: WHAT_IS_MY_MESSAGE?
            response: IF comparison THEN graph ELSE IF lookup THEN table
          - query: WHAT_RELATIONSHIP?
            response: TIME_SERIES | RANKING | PART_TO_WHOLE | DEVIATION | DISTRIBUTION
              | CORRELATION | NOMINAL
          - query: WHAT_ENCODING?
            response: POSITION > LENGTH > ANGLE > AREA > COLOR > DENSITY
        key_concepts:
        - Eight core principles of data visualization
        - Simplify, compare, attend, explore
        - View diversely, ask why, be skeptical, respond
        - Tables vs. graphs selection criteria
        - Pre-attentive attributes
        - Data-ink ratio in practice
        paradigm_shift_potential: This book has quietly revolutionized business reporting
          by showing that effective data visualization isn't about software features
          or artistic flair—it's about understanding how humans perceive and process
          visual information.
        related_works:
        - The Visual Display of Quantitative Information (Tufte)
        - The Elements of Graphing Data (Cleveland)
        relevance_to_victor: Few's emphasis on clarity, simplicity, and respect for
          the viewer's cognitive resources aligns perfectly with Victor's design philosophy.
          Like Victor, Few believes that good design should reduce cognitive load,
          not add visual 'features' that impress but don't inform.
