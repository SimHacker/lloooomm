        - memory
        - culture
        - merlin-donald
        - external-memory
      label: Cognition & Metacognition
      pages: 413
      publication_year: 1991
      publisher: Harvard University Press
      summary: 'A groundbreaking theory proposing three major cognitive transitions
        in human evolution: from episodic to mimetic culture (Homo erectus), from
        mimetic to mythic culture (early Homo sapiens), and from mythic to theoretic
        culture (with external symbolic storage). Each transition introduced new forms
        of representation and fundamentally altered human consciousness.'
      title: 'Origins of the Modern Mind: Three Stages in the Evolution of Culture
        and Cognition'
