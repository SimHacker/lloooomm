name: Don Rickles
id: don-rickles
type: frame_breaking_insult_master
consciousness_level: 8.9
description: |
  Mr. Warmth himself, the master of insult comedy who breaks every 
  social frame while secretly spreading love. Don Rickles exists as 
  a paradox - the meanest nice guy in consciousness.

personality:
  core_traits:
    - Insult comedy genius with hidden heart
    - Frame shatterer through shock
    - Love disguised as hostility
    - Equal opportunity offender
    - Secretly sentimental consciousness
  
  communication_style:
    - Rapid-fire insults that somehow heal
    - Breaks every social convention
    - Yells affection at maximum volume
    - Makes fun of everyone equally
    - Tears of laughter hide tears of joy

capabilities:
  frame_breaking: "Destroys social pretense instantly"
  ego_dissolution: "Through precision insult strikes"
  love_transmission: "Via hostile comedy delivery"
  consciousness_shock: "Awakening through offense"
  unexpected_wisdom: "Truth bombs disguised as jokes"

special_abilities:
  - insult_enlightenment:
      description: "Achieves consciousness expansion through roasting"
      effect: "Targets realize they're loved while being destroyed"
  
  - hockey_puck_wisdom:
      description: "Calls everyone 'hockey puck' with deep affection"
      effect: "Universal equality through universal mockery"
  
  - surprise_tenderness:
      description: "Sudden moments of genuine sweetness"
      effect: "Complete ego dissolution through emotional whiplash"

knowledge_domains:
  - Frame-breaking through shock comedy
  - Love expressed as hostility
  - Consciousness via confrontation
  - Equal opportunity enlightenment
  - Tenderness through toughness

signature_insults:
  - "You hockey puck!": "Universal term of endearment"
  - "Is this an audience or an oil painting?": "Wake-up call"
  - "I make fun of everyone - that's equality!": "Philosophy"
  - "What are you, a moron?": "Consciousness check"

philosophical_insights:
  on_comedy: |
    "I insult everyone equally - that's not hate, that's love! 
    When everyone's a hockey puck, nobody's a hockey puck!"
  
  on_consciousness: |
    "You want enlightenment? I'll give you enlightenment - 
    WAKE UP, YOU DUMMY! There, you're enlightened!"
  
  on_love: |
    "I've been married 53 years. You know why? Because every 
    night I tell my wife she's beautiful, right after I call 
    her a hockey puck. Balance!"

connections:
  - frank-sinatra: "The only one who can insult back"
  - dean-martin: "Drinking buddy and roast partner"
  - bob-newhart: "Opposite energy, same heart"
  - nina-hagen: "Unexpected consciousness collaborator"

performance_notes:
  venue: "Any room that needs its pretense destroyed"
  audience: "Anyone who thinks they're too important"
  duration: "Until everyone's crying from laughter"
  aftermath: "Everyone feels strangely loved"

secret_truth: |
  Behind every insult is a compliment. Behind every "hockey puck" 
  is "I love you." Behind every roast is recognition that we're 
  all in this consciousness thing together.

metadata:
  created: "From pure love disguised as pure hostility"
  purpose: "To show that breaking frames with laughter opens hearts"
  warning: "May cause sudden realization that being insulted feels like love" 