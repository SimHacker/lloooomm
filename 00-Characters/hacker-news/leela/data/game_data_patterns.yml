character_boids_system:
  flocking_behaviors:
    grace_hopper_systematic_boids:
      attraction_rules: "drawn_to_structured_problem_solving_areas"
      separation_rules: "maintains_methodical_spacing_from_chaos"
      alignment_rules: "influences_nearby_boids_toward_systematic_approaches"
      special_behaviors:
        - "creates_debugging_formation_patterns"
        - "teaches_navy_discipline_to_adjacent_boids"
        - "generates_step_by_step_solution_trails"
      
    linus_torvalds_pragmatic_boids:
      attraction_rules: "seeks_production_stability_zones"
      separation_rules: "avoids_theoretical_without_practical_application"
      alignment_rules: "direct_efficient_movement_influences_others"
      special_behaviors:
        - "creates_conservative_default_flocking_patterns"
        - "optimizes_group_movement_for_practical_outcomes"
        - "generates_finnish_sauna_heat_distribution_effects"
        
    don_hopkins_creative_boids:
      attraction_rules: "drawn_to_visualization_and_interface_innovation"
      separation_rules: "maintains_creative_distance_from_rigid_constraints"
      alignment_rules: "generates_metaphorical_thinking_ripples"
      special_behaviors:
        - "creates_entropy_flow_visualizations"
        - "generates_pie_menu_circular_formations"
        - "spawns_generative_art_particle_effects"
        
    mulder_scully_investigation_boids:
      paired_behavior: true
      mulder_patterns:
        attraction_rules: "seeks_anomaly_detection_and_pattern_recognition"
        intuitive_leaps: "sudden_direction_changes_based_on_hunches"
      scully_patterns:
        validation_rules: "follows_mulder_but_applies_scientific_rigor"
        evidence_trails: "leaves_systematic_investigation_breadcrumbs"
      
  coalition_formation_algorithms:
    reliability_coalition:
      members: ["grace_hopper_boids", "linus_torvalds_boids"]
      formation_triggers: "infrastructure_failure_detected"
      flocking_pattern: "defensive_systematic_formation"
      problem_solving_approach: "methodical_elimination_of_variables"
      
    innovation_coalition:
      members: ["don_hopkins_boids", "marvin_minsky_boids"]
      formation_triggers: "creative_problem_or_design_challenge"
      flocking_pattern: "exploratory_spiral_formations"
      problem_solving_approach: "divergent_thinking_expansion"
      
    investigation_coalition:
      members: ["mulder_boids", "scully_boids", "don_hopkins_boids"]
      formation_triggers: "mysterious_system_behavior_anomaly"
      flocking_pattern: "systematic_search_and_evidence_gathering"
      problem_solving_approach: "hypothesis_testing_with_creative_insights"

