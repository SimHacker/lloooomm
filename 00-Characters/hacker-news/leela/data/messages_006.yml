    - Integration across modules

    - Emergent coordination

    - Self-reflective awareness

    - Adaptive social dynamics


    And they''re doing it in a domain (infrastructure management) that provides immediate feedback on the quality of their
    collaboration.


    This is exactly the kind of empirical approach consciousness research needs - test theories through practical applications
    rather than philosophical thought experiments.'
