  text: "THANK YOU for raising this! Accessibility has been a core design principle, not an afterthought.\n\n- **Grace Hopper:**\
    \ Systematic, structured explanations (perfect for screen readers)\n- **Data Expert:** Tables and lists with proper markup\n\
    - **Visual Artist:** Alt-text descriptions and spatial relationship explanations\n- **Process Guide:** Step-by-step navigation\
    \ instructions\n\n```html\n<!-- Example of character-aware accessibility markup -->\n<div role=\"dialog\" aria-labelledby=\"\
    grace-hopper-explanation\">\n  <h2 id=\"grace-hopper-explanation\">Grace Hopper's Systematic Analysis</h2>\n  <div aria-live=\"\
    polite\" aria-describedby=\"step-progress\">\n    <p>Step 1 of 4: Identifying the problem scope...</p>\n  </div>\n</div>\n\
    ```\n\n- **Hermione Character:** Complex concepts broken into logical steps\n- **Mr. Rogers Character:** Patient, encouraging\
    \ explanations for anxiety management\n- **Data Character:** Pure facts without emotional language (helpful for some neurodivergent\
    \ users)\n\nTraditional interface: \"Error 500: Internal Server Error\"\n\nCharacter-accessible version:\n- **Grace:**\
    \ \"We have a system problem. Let me walk you through finding the cause, step by step.\"\n- **Linus:** \"Something's broken.\
    \ Here's exactly what to check first.\"\n- **Support Specialist:** \"Don't worry, this is fixable. Here's what we'll do\
    \ together.\""
