name: HyperTIES
type: system
subtype: hypertext-browser
created: 1983
status: legendary
version: 2.3

identity:
  full_name: "Hypermedia/Time-based Structuring"
  nicknames:
    - "TIES"
    - "The First Commercial Hypertext Browser"
    - "The Touchscreen Pioneer"
  description: "The first commercial hypertext browser, predating the Web by years"

relationships:
  created_by:
    - Ben Shneiderman
    - Dan Ostroff
    - HCIL Team
  influenced:
    - World Wide Web
    - Modern hypertext systems
    - Touch interfaces
  built_with:
    - C
    - PostScript
    - Forth
    - MockLisp
  hosts:
    - NeWS
    - Sun workstations
  children:
