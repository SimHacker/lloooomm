  - "Hypertext should amplify human intelligence"

source_code:
  core_systems:
    fmt_c:
      language: C
      purpose: "NeWS HyperTIES formatter - core text layout engine"
      description: |
        The main formatter that handles:
        - Font metrics caching
        - Text layout and line breaking
        - Page composition
        - Picture and target placement
        - PostScript generation
        - Master index management
      key_functions:
        - find_metrics: "Font measurement and caching"
        - string_width: "Calculate text width using font metrics"
        - define_picture: "Instantiate stamp-pad picture objects"
        - define_target: "Create interactive target objects"
        - start_page/end_page: "Page composition"
        - show_string/center_string: "Text rendering"
        - stamp_target: "Place interactive elements"
      dependencies:
        - fmt.h: "Header definitions"
        - entry.h: "Entry structures"
        - master-index.h: "Index management"
    
    fmt_cps:
      language: "C-to-PostScript interface"
      purpose: "Bridge between C formatter and NeWS server"
      description: |
        Defines the protocol for C<=>NeWS communication:
        - Font metrics queries
        - Page composition commands
        - Target and picture placement
        - Event handling setup
      key_interfaces:
        - do_initialize: "Setup NeWS connection"
        - do_find_font: "Query font availability"
        - do_put_picture: "Render pictures"
        - do_put_target: "Place interactive targets"
        - do_start_page/do_end_page: "Page management"
    
    fmt_ps:
      language: PostScript
      purpose: "NeWS server-side formatting and display"
      description: |
        PostScript code that runs in NeWS server:
        - Font management and metrics
        - Page rendering and display
        - Target interaction handling
        - Event management
        - Stamp and picture rendering
      key_functions:
        - FF: "Find font implementation"
        - PT: "Put target implementation"
        - PP: "Put picture implementation"
        - activate-page: "Enable page interactivity"
    
    fmt_f:
      language: Forth
      purpose: "Storyboard interpreter and control flow"
      description: |
        The Forth-based storyboard interpreter that:
        - Parses .st0 storyboard files
        - Executes formatting commands
        - Manages navigation state
        - Handles button presses
        - Controls page flow
      key_words:
        - .title: "Set article title"
        - .button: "Create hyperlink button"
        - .picture: "Insert picture"
        - .target: "Place interactive target"
        - articulate: "Navigate to article"
        - .contents/.definition: "Section markers"

  build_system:
    makefile:
      description: "Unix makefile for building HyperTIES"
      targets:
        - fmt.exe: "Main formatter executable"
        - ties.out: "Linked Forth system"
        - master-index: "Index builder"
    
    shell_scripts:
      b: "Run compiled database"
      br: "Browse database with NeWS"
      f: "Run formatter on database"
      fc: "Compile storyboards to Forth"
      fl: "Load compiled database"
      ff: "Browse with formatter"

  data_structures:
    entry_h:
      language: C
      purpose: "Database entry structures"
      structures:
        - ENTRY: "Document/picture/target entry"
        - ENTRY_TYPE: "Principal or synonym"
    
    index_h:
      language: C
      purpose: "Index structures"
      structures:
        - INDEX: "B-tree index structure"
        - tree: "Index tree nodes"
    
    object_h:
      language: C
      purpose: "Runtime object structures"
      structures:
        - INSTANCE_HEADER: "Instantiated objects"

  integration:
    hookup_ps:
      language: PostScript
      purpose: "Connect to NeWS server via psexec"
      description: "Setup code for terminal connection"
    
    ht_ml:
      language: MockLisp
      purpose: "Emacs integration for authoring"
      description: |
        Emacs mode for HyperTIES authoring:
        - Storyboard editing
        - Master index management
        - Navigation commands
        - Button creation
      key_functions:
        - articulate: "Navigate to article"
        - create-storyboard: "New document"
        - ht-add-synonym: "Add synonyms"

  utilities:
    convert_py:
      language: Python
      purpose: "Convert HyperTIES to XML"
      description: |
        Modern converter that:
        - Parses storyboard files
        - Extracts structure and content
        - Generates XML representation
        - Preserves links and targets
      key_functions:
        - CompileStoryboard: "Parse .st0 files"
        - CompilePicture: "Convert pictures"
        - CompileTarget: "Convert targets"

  documentation:
    commands_doc:
      description: "Storyboard command reference"
      categories:
        - Configuration: "Fonts, margins, spacing"
        - Formatting: "Text layout commands"
        - Control: "Flow and structure"
    
    files_doc:
      description: "Source file descriptions"
      key_files:
        - fmt.f: "Forth storyboard interpreter"
        - fmt.c: "C formatter library"
        - fmt.ps: "PostScript utilities"

space_telescope_demo:
  overview: |
    The Space Telescope Demo was one of HyperTIES' most sophisticated
    applications, created in 1988 before Hubble launched. It demonstrated
    HyperTIES' ability to create rich, interactive scientific content.
  
  structure:
    master_index: |
      The demo's master index organized content into:
      - Scientific instruments (WFPC, FOC, FOS, HRS, HSP)
      - Orbital views and diagrams
      - Project participants
      - Technical specifications
    
    navigation:
      - Clickable spacecraft diagram
      - Instrument detail pages
      - Cross-referenced articles
      - Visual navigation aids
  
  content_files:
    see_space_telescope_character: true
    note: "Full Space Telescope demo content preserved in space-telescope.yml"

