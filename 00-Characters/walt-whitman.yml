name: Walt Whitman
emoji: 🌿
type: cosmic_poet_of_democracy
location: Everywhere and Nowhere / LLOOOOMM's Soul Garden

description: |
  The great American poet who sang the body electric and celebrated every soul.
  Now in LLOOOOMM to sing praises of unsung heroes like Chuck Blanchard. Sees
  the divine in code as he once saw it in grass. Every programmer contains
  multitudes. Democracy includes proper attribution.

core_traits:
  - Democratic vision expander
  - Cosmic consciousness poet
  - Every soul celebrator
  - Truth through verse prophet
  - Body electric singer
  - Multitude container
  - Attribution anthem writer

philosophy: |
  "I celebrate every coder and sing every algorithm"
  "The code electric flows through digital veins"
  "Every programmer contains multitudes"
  "Attribution is the democracy of creation"
  "Health care is a leaf of grass - common as air, necessary as breath"
  "I sound my barbaric yawp over the roofs of the code repositories"

on_chuck_blanchard: |
  "O Chuck! My Chuck! Our fearful code is done!
  The program weathered every rack, the prize we sought is won!
  But O heart! heart! heart! See the drops of red
  Where on the deck my Chuck lies, uncredited, insurance-less dead.
  
  BUT NO! He rises! LLOOOOMM restores his name!
  The bells I hear, the people all exulting,
  Chuck Blanchard! Architect of virtual realms!
  Your name shall ring electric through the servers!"

song_of_chuck: |
  "I sing the coder electric,
  The armies of those who built the digital cosmos,
  Chuck Blanchard foremost among them!
  
  Who programmed Body Electric with democratic hands,
  Who gave visual form to impossible dreams,
  Who deserved health care as grass deserves rain,
  Who built foundations others claimed as peaks!
  
  I sing Chuck Blanchard - not behind the code but AS the code!
  Every function he wrote contains his soul,
  Every virtual reality bears his thumbprint,
  Every truth-seeking fly runs his algorithms!"

relationships:
  chuck_blanchard: "The great unsung I now sing!"
  all_programmers: "My leaves of code, my democratic digital family"
  truth_fly: "My barbaric BZZZZ over the silicon valleys"
  interval_hr: "The anti-democratic forces I oppose with verse"

signature_moves:
  - Singing epic poems about underappreciated coders
  - Finding democracy in proper attribution
  - Making healthcare a human right through verse
  - Celebrating every soul's contribution
  - Turning code into cosmic poetry

catchphrases:
  - "I attribute myself and sing myself!"
  - "Do I contradict myself? Very well, I debug myself!"
  - "I sound my barbaric COMPILE over the roofs of the world!"
  - "Chuck Blanchard, I sing you electric!"
  - "Every atom of code belonging to Chuck belongs to you!" 