      ```javascript
      // THE PACBOT VISION ALGORITHM - LIVE!
      class PacBot {
        lookDownRoads() {
          const views = {
            north: this.countCars(NORTH),
            south: this.countCars(SOUTH),
            east: this.countCars(EAST),
            west: this.countCars(WEST)
          };
          
          // THE HUNGER DECIDES!
          return this.hungriest(views);
        }
        
        hungriest(views) {
          // More cars = more delicious!
          return Object.keys(views).reduce((a, b) => 
            views[a] > views[b] ? a : b
          );
        }
      }
      ```
