name: "Pie Menus: A 30 Year Retrospective"
type: talk
speaker: Don Hopkins
date: 2018-05-15
anniversary_of: CHI'88 Conference
location: online/Medium article

summary: |
  Comprehensive retrospective on 30 years of pie menu development, from the original 
  CHI'88 paper showing 15% speed improvement over linear menus to implementations 
  across dozens of platforms and applications.

key_themes:
  - spatial_memory: "The mind may forget, but the body remembers"
  - self_revealing_interfaces: "They lead, follow, or get out of the way"
  - gestural_interaction: "Mouse ahead display preemption"
  - muscle_memory: "Directional selection creates automatic gestures"
  - rehearsal: "Every selection practices the gesture"

major_points:
  - empirical_validation:
      finding: "15% faster with lower error rate than linear menus"
      conference: CHI'88
      co_authors: ["Jack Callahan", "Ben Shneiderman", "Mark Weiser"]
  
  - design_principles:
      - "Equal distance to all targets (Fitts's Law optimization)"
      - "Direction-based selection, not target-based"
      - "Wedge-shaped targets extending to screen edge"
      - "Support for marking ahead without waiting"
  
  - evolution:
      - "Started at UMD HCIL in 1986"
      - "First implementation in NeWS window system"
      - "Ported to dozens of platforms over 30 years"
      - "Used in The Sims, SimCity, and many other applications"

implementations_mentioned:
  - NeWS: "Original PostScript-based implementation"
  - The_Sims: "Most successful commercial deployment"
  - SimCity: "Multiple versions including OLPC"
  - Unity3D: "Modern game engine implementation"
  - jQuery: "Web-based implementation"
  - ActiveX: "Internet Explorer plugin (failed)"

related_talks:
  - fabrik_pie_menus: "Dan Ingalls' independent invention"
  - pixie_1969: "First circular menus by Wiseman"
  - empowered_chi90: "Live performance demonstration"

connections_to_people:
  - ben_shneiderman: "Advisor and collaborator"
  - mark_weiser: "Co-author and mentor"
  - dan_ingalls: "Independent pie menu inventor for Fabrik"
  - jaron_lanier: "Quote about body memory"

repeated_themes_across_talks:
  - democratizing_interfaces: "Making complex actions simple"
  - playful_computing: "Fun as a design principle"
  - user_empowerment: "Users should control their tools"
  - spatial_thinking: "Navigation as understanding"

artifacts:
  - paper: "An Empirical Comparison of Pie vs. Linear Menus"
  - article: "https://medium.com/@donhopkins/pie-menus-936fed383ff1"
  - implementations: "Multiple open source versions available"

quotes:
  - "The mind may forget, but the body remembers - Jaron Lanier"
  - "Self-revealing gestural interface"
  - "Novices soon become experts"

legacy:
  - "Influenced radial menu designs in many applications"
  - "Validated importance of spatial memory in UI"
  - "Demonstrated value of gestural interfaces before touch screens" 