name: "Open Sourcing SimCity / Micropolis"
type: project/talk/demo
speaker: Don Hopkins
date: 2008
context: "One Laptop Per Child (OLPC) project"
conferences: ["HAR 2009 Lightning Talk", "Various OLPC presentations"]

summary: |
  The story of how Don convinced EA to open source the original SimCity for the 
  OLPC project, then cleaned up, modernized, and transformed it into Micropolis - 
  a fully open source city simulation for educational use.

key_themes:
  - constructionist_education: "Learning through building and experimentation"
  - open_source_advocacy: "Making commercial software free for education"
  - code_archaeology: "Modernizing 20-year-old C code"
  - educational_gaming: "Games as learning tools"
  - collaborative_play: "Multi-player educational experiences"

project_timeline:
  - negotiation: "Convinced EA to release under GPL"
  - code_cleanup: "Removed proprietary dependencies"
  - modernization: "C to C++, added Python bindings"
  - documentation: "Doxygen documentation added"
  - web_version: "OpenLaszlo/Flash client"

technical_achievements:
  - code_renovation:
      - "Cleaned up 20-year-old C code"
      - "Converted to modern C++"
      - "Added comprehensive documentation"
      - "Created Python bindings with SWIG"
  
  - architectural_improvements:
      - "Separated game engine from UI"
      - "Added scripting capabilities"
      - "Network protocol for multiplayer"
      - "Web-based client/server architecture"

educational_features:
  - constructionist_principles:
      - "Learn by building cities"
      - "Experiment with cause and effect"
      - "Collaborative problem solving"
      - "Open-ended exploration"
  
  - olpc_integration:
      - "Sugar activity framework"
      - "Collaborative features"
      - "Low-resource optimization"
      - "Localization support"

related_talks:
  - har_2009_lightning: "Constructionist Educational Open Source SimCity"
  - simcity_history: "Evolution from X11 to OLPC"
  - visual_programming: "SimAntics influence"

