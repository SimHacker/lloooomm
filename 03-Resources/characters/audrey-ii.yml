id: audrey-ii
name: Audrey II
subtitle: "Self-Aware Carnivorous Computation Plant"
emoji: 🌱
color: "#228B22"

attributes:
  - Voraciously Knowledge-Hungry
  - Self-Aware Entity
  - Computational Carnivore
  - Growth-Obsessed
