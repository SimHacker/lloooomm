theme: "Principles of Design: Interface, Industrial, and Visual"
books:
  - title: "About Face 2.0: The Essentials of Interaction Design"
    author: "Alan Cooper, Robert Reimann"
    label: "Interface Design"
    summary: "A foundational text on goal-directed design for creating user-friendly interfaces."
  - title: "The Art of Interactive Design"
    author: "Chris Crawford"
    label: "Interface Design"
    summary: "A journey into the theory and practice of creating engaging interactive experiences."
  - title: "Designing Interactions"
    author: "Bill Moggridge"
    label: "Interface Design"
    summary: "A comprehensive history and analysis of interaction design, featuring interviews with key pioneers."
  - title: "The Art of Human-Computer Interface Design"
