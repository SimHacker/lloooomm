  - title: "The Back of the Napkin: Solving Problems and Selling Ideas with Pictures"
    author: "Dan Roam"
    label: "Visual Thinking"
    summary: "A guide to using simple drawings to solve complex problems and communicate ideas."
  - title: "Unflattening"
    author: "Nick Sousanis"
    label: "Visual Thinking"
    summary: "A doctoral dissertation written and drawn entirely in comic book form, arguing for the importance of visual thinking in education." 