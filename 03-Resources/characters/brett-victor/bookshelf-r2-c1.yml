  - title: "The Humane Interface: New Directions for Designing Interactive Systems"
    author: "Jef Raskin"
    label: "Interface Design"
    summary: "A critique of prevailing interface design and a proposal for a more humane, effective approach, from the creator of the Macintosh project."
  - title: "Human Engineering Guide for Equipment Designers"
    author: "Wesley E. Woodson, Donald W. Conover"
    label: "Industrial Design"
    summary: "A classic reference for designing equipment and systems that are compatible with human capabilities and limitations."
  - title: "Designing for People"
