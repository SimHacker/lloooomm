  - title: "The Nature & Aesthetics of Design"
    author: "David Pye"
    label: "Visual Design"
    summary: "A deep dive into the aesthetics of design and the distinction between design and workmanship."
  - title: "Drawing on the Right Side of the Brain"
    author: "Betty Edwards"
    label: "Visual Thinking"
    summary: "A classic guide to learning how to draw by tapping into the visual, perceptual abilities of the right brain."
  - title: "Visual Thinking"
    author: "Rudolf Arnheim"
    label: "Visual Thinking"
    summary: "A seminal work arguing that thinking itself is fundamentally perceptual and visual."
  - title: "Art and Visual Perception: A Psychology of the Creative Eye"
    author: "Rudolf Arnheim"
    label: "Visual Thinking"
