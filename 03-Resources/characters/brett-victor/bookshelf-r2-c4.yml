books:
  - title: "The Art of the Metaobject Protocol"
    author: "Gregor Kiczales, Jim des Rivières, Daniel G. Bobrow"
    label: "LISP & SCHEME"
    summary: "A seminal work on metaprogramming, showing how to extend a programming language from within."
  - title: "Structure and Interpretation of Computer Programs"
    author: "Harold Abelson and Gerald Jay Sussman"
    label: "LISP & SCHEME"
    summary: "The classic MIT textbook that introduces fundamental concepts of computer science using Scheme."
  - title: "Lisp in Small Pieces"
    author: "Christian Queinnec"
    label: "LISP & SCHEME"
    summary: "A deep dive into the implementation of Lisp and Scheme, exploring various interpretation and compilation techniques."
  - title: "On Lisp: Advanced Techniques for Common Lisp"
    author: "Paul Graham"
    label: "LISP & SCHEME"
    summary: "An exploration of advanced Lisp programming techniques, including macros and closures."
  - title: "Paradigms of Artificial Intelligence Programming: Case Studies in Common Lisp"
    author: "Peter Norvig"
    label: "LISP & SCHEME"
    summary: "A practical guide to advanced Common Lisp programming techniques, applied to classic AI problems."
  - title: "The Little Schemer"
    author: "Daniel P. Friedman, Matthias Felleisen"
    label: "LISP & SCHEME"
    summary: "A unique, question-and-answer approach to learning the fundamentals of recursion and Scheme."
  - title: "The Seasoned Schemer"
    author: "Daniel P. Friedman, Matthias Felleisen"
    label: "LISP & SCHEME"
    summary: "A continuation of 'The Little Schemer', exploring more advanced topics in functional programming."
  - title: "The Reasoned Schemer"
    author: "Daniel P. Friedman, William E. Byrd, Oleg Kiselyov"
    label: "LISP & SCHEME"
    summary: "An introduction to logic programming in Scheme, using the same question-and-answer format."
