# Bookshelf section from the fifth image, a blend of music theory, persuasion, and management.
# The labels are identified from the photo: MUSIC THEORY, PERSUASION, MANAGEMENT.

character: "brett-victor"
bookshelf_section: "r5-c1"
theme: "Systems of Harmony, Influence, and Organization"
books:
  - title: "Harmonic Experience: Tonal Harmony from Its Natural Origins to Its Modern Expression"
    author: "W. A. Mathieu"
    label: "Music Theory"
    summary: "A deep exploration of the principles of harmony, connecting music theory to universal patterns."
  - title: "On the Sensations of Tone as a Physiological Basis for the Theory of Music"
    author: "Hermann von Helmholtz"
    label: "Music Theory"
    summary: "A landmark 19th-century work that combines physics, physiology, and aesthetics to explain the perception of sound."
  - title: "Temperament: The Idea That Solved Music's Greatest Riddle"
    author: "Stuart Isacoff"
    label: "Music Theory"
    summary: "A history of the development of musical tuning systems and the passionate debates that surrounded them."
  - title: "How Equal Temperament Ruined Harmony (and Why You Should Care)"
    author: "Ross W. Duffin"
    label: "Music Theory"
    summary: "A provocative argument that modern tuning has sacrificed harmonic richness for convenience."
  - title: "Choreo-Graphics: A Comparison of Dance Notation Systems from the Fifteenth Century to the Present"
    author: "Ann Hutchinson Guest"
    label: "Music Theory" # Note: This is physically on the music theory shelf, though about dance notation.
    summary: "A comprehensive survey of the history and methods of notating dance and movement."
  - title: "Traces of Dance: Drawings and Notations of Performers"
    author: "Valda / Preston-Dunlop / Louppe"
    label: "Music Theory" # Note: This is physically on the music theory shelf, though about dance notation.
    summary: "A visual exploration of dance notation and the representation of movement."
  - title: "Made to Stick: Why Some Ideas Survive and Others Die"
    author: "Chip Heath & Dan Heath"
    label: "Persuasion"
    summary: "An analysis of what makes ideas memorable and effective, based on the principle of 'stickiness'."
  - title: "Getting More: How You Can Negotiate to Succeed in Work and Life"
    author: "Stuart Diamond"
    label: "Persuasion"
    summary: "A guide to negotiation based on finding and valuing the other side's perceptions."
  - title: "Switch: How to Change Things When Change Is Hard"
    author: "Chip Heath & Dan Heath"
    label: "Persuasion"
    summary: "A framework for bringing about change, focusing on the interplay between the rational and emotional mind."
  - title: "Why We Buy: The Science of Shopping"
    author: "Paco Underhill"
    label: "Persuasion"
    summary: "A classic work of retail anthropology, revealing the hidden patterns of consumer behavior."
  - title: "Influence: The Psychology of Persuasion"
    author: "Robert B. Cialdini"
    label: "Persuasion"
    summary: "A foundational text on the psychology of compliance, outlining six key principles of influence."
  - title: "The Innovator's Dilemma: When New Technologies Cause Great Firms to Fail"
    author: "Clayton M. Christensen"
    label: "Management"
    summary: "A classic work of business strategy that introduces the concept of disruptive innovation."
  - title: "The Essential Drucker"
    author: "Peter F. Drucker"
    label: "Management"
    summary: "A collection of writings from the influential management consultant, covering the essentials of management theory and practice."
  - title: "Peopleware: Productive Projects and Teams"
    author: "Tom DeMarco and Timothy Lister"
    label: "Management"
    summary: "A classic work on software project management, focusing on the human element."
  - title: "The Design of Design: Essays from a Computer Scientist"
    author: "Frederick P. Brooks Jr."
    label: "Management"
    summary: "A collection of essays on the process of design, drawing on the author's experience in software engineering."
  - title: "The Mythical Man-Month: Essays on Software Engineering"
    author: "Frederick P. Brooks Jr."
    label: "Management"
    summary: "A landmark book in software engineering, arguing that adding manpower to a late software project makes it later." 