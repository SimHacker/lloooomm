# Artifacts
artifacts:
  - id: "lisp-chine-nual-shirt"
    name: "Orange 'LISP CHINE NUAL' T-Shirt"
    description: "A custom-made orange t-shirt modeled after the iconic Lisp Machine Manual. The title 'LISP MACHINE MANUAL' is printed in large, bold letters wrapped around the side, making only 'LISP CHINE NUAL' visible from the front. A powerful shibboleth, it is instantly recognizable to fellow hackers and Lisp aficionados, sparking conversations in the most unexpected places (like Amsterdam on Queen's Day)."
    image: "lisp-chine-nual-shirt.jpg"
  - id: "lisp-machine-manual"
    name: "The Lisp Machine Manual"
    description: "The 'Chine Nual' itself. The canonical reference manual for the MIT Lisp Machine, co-authored by David Moon, Richard Stallman, and Daniel Weinreb. Its distinctive cover design is a piece of hacker history."
    image: "lisp-machine-manual.jpg"

