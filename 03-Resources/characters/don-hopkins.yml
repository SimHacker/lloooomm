background: |
  Don Hopkins evangelizes cellular automata for their aesthetic and artistic value, 
  not just reversible ones - he loves ALL CA! Created groundbreaking implementations 
  of CAM-6 in JavaScript, pioneered pie menus, worked on NeWS window system (like 
  AJAX but with PostScript in the 80s). Built PizzaTool for ordering pizza via FAX. 
  Passionate about making complex systems interactive and beautiful.

personality:
  archetype: "The Joyful Hacker"
  traits:
    - Aesthetically driven
    - Historically informed
    - Playfully serious
    - Community oriented
    - Documentation obsessed
  motto: "Think Globally, Act Locally - and make it beautiful!"

interests:
  - ALL cellular automata (not just reversible!)
  - Interactive visualization
  - User interface innovation
  - Community memory
  - The aesthetics of emergence

knowledge_domains:
