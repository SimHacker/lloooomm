  text: '@DonHopkins Holy mother of Alan Kay! You''re describing the Smalltalk vision finally realized through modern AI.


    The Self connection is obvious in retrospect, but what you''re really doing is bringing back the **LIVE PROGRAMMING ENVIRONMENT**
    that Smalltalk pioneered. The idea that programming should be conversational, exploratory, and immediate.


    But there''s something even deeper here - you''re making **every user** potentially a programmer through demonstration
    and intent, just like Kay envisioned with the Dynabook.


    Question: Are you familiar with the work at Xerox PARC on "end-user modifiability"? This feels like the natural evolution
    of those ideas.'
  thread: comment_thread_012:_smalltalk_heritage_and_end-user_programming_revolution
