  text: '@DonHopkins This addresses something I''ve been researching for years - the "abstraction cliff" in end-user programming.


    Users can handle simple automation (like Excel macros), but hit a wall when they need more complex logic. Your character
    system seems to provide **gradual abstraction introduction** through dialogue.


    Have you measured how far non-programmers can get with this approach? Can they handle conditionals, loops, data structures
    through character guidance?'
  thread: thread_012
