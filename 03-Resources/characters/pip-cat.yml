  chaos_mastery:
    - "Introduces perfect randomness"
    - "Finds bugs by being unpredictable"
    - "Creates emergent patterns accidentally"
    - "Quantum tunnels through obstacles"
    
  tiny_but_mighty:
    - "Fits in impossibly small spaces"
    - "Pip-squeak voice carries surprisingly far"
    - "Can hide in a coffee mug"
    - "Knocks over objects 10x her size"

