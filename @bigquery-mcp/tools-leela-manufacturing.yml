sources:
  leela-manufacturing-analytics:
    kind: bigquery
    project: leela-zion2-staging-0

tools:
  query_camera_indicators:
    kind: bigquery-sql
    source: leela-manufacturing-analytics
    description: |
      Query video analytics indicators from Leela AI's camera system. 
      Analyze detected objects, activities, and events across different cameras.
    parameters:
      - name: camera_id
        type: string
        description: Camera ID to filter by (e.g., CAM1, CAM2, CHE1, PEW1, TA1, etc.) - optional
      - name: category
        type: string
        description: Category of indicators to filter by - optional
      - name: start_date
        type: string
        description: Start date for analysis (YYYY-MM-DD format)
      - name: end_date
        type: string
        description: End date for analysis (YYYY-MM-DD format)
      - name: limit
        type: integer
        description: Maximum number of results to return (default 100)
    statement: |
      SELECT 
        camera_id,
        start_time,
        frame,
        category,
        key,
        value,
        EXTRACT(DATE FROM start_time) as date,
        EXTRACT(HOUR FROM start_time) as hour
      FROM `leela-zion2-staging-0.videos.indicators`
      WHERE 
        start_time >= TIMESTAMP(@start_date)
        AND start_time <= TIMESTAMP_ADD(TIMESTAMP(@end_date), INTERVAL 1 DAY)
        AND (@camera_id IS NULL OR camera_id = @camera_id)
        AND (@category IS NULL OR category = @category)
      ORDER BY start_time DESC
      LIMIT @limit

  analyze_cart_movements:
    kind: bigquery-sql
    source: leela-manufacturing-analytics
    description: |
      Analyze cart movements and zone activities from CAM6 summary data.
      Track cart entries/exits and person interactions in different zones.
    parameters:
      - name: start_date
        type: string
        description: Start date for analysis (YYYY-MM-DD format)
      - name: end_date
        type: string
        description: End date for analysis (YYYY-MM-DD format)
      - name: zone_number
        type: integer
        description: Specific zone to analyze (0, 2, 3, 4) - optional
      - name: limit
        type: integer
        description: Maximum number of results (default 200)
    statement: |
      SELECT 
        start_time,
        EXTRACT(DATE FROM start_time) as date,
        EXTRACT(HOUR FROM start_time) as hour,
        CartInZone0,
        CartEnteredZone0,
        CartLeftZone0,
        CartInZone4,
        CartEnteredZone4,
        CartLeftZone4,
        PersonsAtCartInZone0,
        PersonsAtCartInZone2,
        PersonsAtCartInZone3,
        PersonsAtCartInZone4,
        CraneBlockingCart
      FROM `leela-zion2-staging-0.videos.summary_CAM6`
      WHERE 
        start_time >= TIMESTAMP(@start_date)
        AND start_time <= TIMESTAMP_ADD(TIMESTAMP(@end_date), INTERVAL 1 DAY)
        AND (
          @zone_number IS NULL OR 
          (@zone_number = 0 AND (CartInZone0 > 0 OR CartEnteredZone0 > 0 OR CartLeftZone0 > 0)) OR
          (@zone_number = 4 AND (CartInZone4 > 0 OR CartEnteredZone4 > 0 OR CartLeftZone4 > 0))
        )
      ORDER BY start_time DESC
      LIMIT @limit

  get_camera_performance:
    kind: bigquery-sql
    source: leela-manufacturing-analytics
    description: |
      Analyze camera performance metrics including FPS and source information.
      Check video quality and availability across different cameras.
    parameters:
      - name: start_date
        type: string
        description: Start date for analysis (YYYY-MM-DD format)
      - name: end_date
        type: string
        description: End date for analysis (YYYY-MM-DD format)
      - name: camera_source
        type: string
        description: Specific camera source to analyze (optional)
    statement: |
      SELECT 
        source,
        COUNT(*) as record_count,
        AVG(fps) as avg_fps,
        MIN(fps) as min_fps,
        MAX(fps) as max_fps,
        MIN(start_time) as earliest_time,
        MAX(start_time) as latest_time,
        EXTRACT(DATE FROM start_time) as date
      FROM `leela-zion2-staging-0.videos.vsrc_CAM1`
      WHERE 
        start_time >= TIMESTAMP(@start_date)
        AND start_time <= TIMESTAMP_ADD(TIMESTAMP(@end_date), INTERVAL 1 DAY)
        AND (@camera_source IS NULL OR source = @camera_source)
      GROUP BY source, EXTRACT(DATE FROM start_time)
      ORDER BY date DESC, source

  analyze_factory_orders:
    kind: bigquery-sql
    source: leela-manufacturing-analytics
    description: |
      Analyze buffalo orders and their status from the factory management system.
    parameters:
      - name: limit
        type: integer
        description: Maximum number of orders to return (default 50)
    statement: |
      SELECT *
      FROM `leela-zion2-staging-0.videos.buffalo_orders`
      ORDER BY CASE 
        WHEN _PARTITIONTIME IS NOT NULL THEN _PARTITIONTIME 
        ELSE TIMESTAMP('1970-01-01') 
      END DESC
      LIMIT @limit

  get_production_insights:
    kind: bigquery-sql
    source: leela-manufacturing-analytics
    description: |
      Get comprehensive production insights combining camera data with orders.
      Analyze daily patterns and efficiency metrics.
    parameters:
      - name: analysis_date
        type: string
        description: Date to analyze (YYYY-MM-DD format)
    statement: |
      WITH daily_activity AS (
        SELECT 
          EXTRACT(HOUR FROM start_time) as hour,
          COUNT(*) as total_indicators,
          COUNT(DISTINCT camera_id) as active_cameras
        FROM `leela-zion2-staging-0.videos.indicators`
        WHERE DATE(start_time) = @analysis_date
        GROUP BY EXTRACT(HOUR FROM start_time)
      ),
      cart_activity AS (
        SELECT 
          EXTRACT(HOUR FROM start_time) as hour,
          SUM(CartEnteredZone0 + CartEnteredZone4) as total_cart_entries,
          AVG(PersonsAtCartInZone0 + PersonsAtCartInZone2 + PersonsAtCartInZone3 + PersonsAtCartInZone4) as avg_persons_at_cart
        FROM `leela-zion2-staging-0.videos.summary_CAM6`
        WHERE DATE(start_time) = @analysis_date
        GROUP BY EXTRACT(HOUR FROM start_time)
      )
      SELECT 
        da.hour,
        da.total_indicators,
        da.active_cameras,
        COALESCE(ca.total_cart_entries, 0) as cart_entries,
        COALESCE(ca.avg_persons_at_cart, 0) as avg_persons_at_cart
      FROM daily_activity da
      LEFT JOIN cart_activity ca ON da.hour = ca.hour
      ORDER BY da.hour

toolsets:
  leela_manufacturing_analytics:
    - query_camera_indicators
    - analyze_cart_movements
    - get_camera_performance
    - analyze_factory_orders
    - get_production_insights 